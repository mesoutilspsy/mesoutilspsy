/* ---- lecture des feuilles CSV (parseur RFC-4180 minimal, sans dépendance) ---- */
function bioParseCSV(text){
  const rows=[]; let row=[], field='', inQ=false;
  text=(text||'').replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){
      if(c==='"'){ if(text[i+1]==='"'){ field+='"'; i++; } else inQ=false; }
      else field+=c;
    } else {
      if(c==='"') inQ=true;
      else if(c===','){ row.push(field); field=''; }
      else if(c==='\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else field+=c;
    }
  }
  row.push(field); rows.push(row);
  if(rows.length && rows[rows.length-1].length===1 && rows[rows.length-1][0]==='') rows.pop();
  return rows;
}
function bioCsvObjects(text){
  const rows=bioParseCSV(text); if(rows.length<2) return [];
  const head=rows[0].map(h=>bioNorm(h));
  return rows.slice(1).map(r=>{ const o={}; head.forEach((h,i)=>{ o[h]=(r[i]!=null?r[i]:'').trim(); }); return o; });
}
function bioBuildCatalog(objs){
  const cats=[], byKey={}, cond=new Set();
  objs.forEach(o=>{
    if((o.actif||'').toLowerCase()==='non') return;
    const section=o.section||'Analyses sanguines', categorie=o.categorie||'Divers', examen=o.examen||'';
    if(!examen) return;
    const key=section+'##'+categorie;
    let c=byKey[key];
    if(!c){ c={section, kind:/urinaire/i.test(section)?'urine':'blood', tdm:/suivi th[eé]rapeutique/i.test(section), lithium:/^lithium$/i.test(categorie), cat:categorie, items:[]}; byKey[key]=c; cats.push(c); }
    c.items.push(examen);
    if((o.conditionnel||'').trim().toUpperCase()==='F') cond.add(bioNorm(examen));
  });
  return {cats, cond};
}
function bioResolveExam(ref){
  ref=(ref||'').replace(/\s+/g,' ').trim(); if(!ref) return null;
  let cat=null, item=ref; const bar=ref.indexOf('|');
  if(bar>=0){ cat=ref.slice(0,bar).trim(); item=ref.slice(bar+1).trim(); }
  const ni=bioNorm(item), nc=cat?bioNorm(cat):null;
  const matches=[];
  BIO_CATALOG.forEach(c=>c.items.forEach(it=>{ if(bioNorm(it)===ni && (!nc||bioNorm(c.cat)===nc)) matches.push([c.cat,it]); }));
  return matches.length ? matches[0] : null;
}
function bioBuildCommon(objs){
  const out=[], warn=[];
  objs.forEach(o=>{
    if((o.actif||'').toLowerCase()==='non') return;
    const id=(o.id||'').trim(), nm=(o.titre||'').trim(); if(!id||!nm) return;
    const entry={id, nm, ds:(o.description||'').trim(), clin:(o.clinique||'').trim()};
    if(/^(oui|1|true|x|special)$/i.test((o.special||'').trim())){ entry.special=true; }
    else {
      const exams=[];
      (o.examens||'').split(/[\n;]+/).map(s=>s.trim()).filter(Boolean).forEach(r=>{
        const pair=bioResolveExam(r); if(pair) exams.push(pair); else warn.push(nm+' → « '+r+' »');
      });
      entry.exams=exams;
    }
    out.push(entry);
  });
  return {common:out, warn};
}
let bioSheetsState='idle';   /* idle | loading | done | error */
let bioSheetWarnings=[];
async function bioLoadSheets(){
  if(bioSheetsState==='loading' || bioSheetsState==='done') return;
  const urls=[BIO_SHEET_EXAMENS_CSV, BIO_SHEET_ORDONNANCES_CSV].filter(Boolean);
  if(!urls.length){ bioSheetsState='done'; return; }
  bioSheetsState='loading';
  try{
    const texts=await Promise.all(urls.map(u=>fetch(u,{cache:'no-store'}).then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.text(); })));
    /* on identifie chaque feuille d'après ses colonnes (ordre des URL indifférent) */
    let exObjs=null, orObjs=null;
    texts.forEach(t=>{
      const objs=bioCsvObjects(t); if(!objs.length) return;
      const keys=Object.keys(objs[0]);
      if(keys.indexOf('examen')>=0 || (keys.indexOf('categorie')>=0 && keys.indexOf('titre')<0)) exObjs=objs;
      else if(keys.indexOf('titre')>=0 || keys.indexOf('examens')>=0) orObjs=objs;
    });
    if(exObjs){ const {cats,cond}=bioBuildCatalog(exObjs); if(cats.length){ BIO_CATALOG=cats; BIO_COND_FEMALE=cond.size?cond:BIO_COND_FEMALE; } }
    if(orObjs){ const {common,warn}=bioBuildCommon(orObjs); if(common.length){ BIO_COMMON=common; bioSheetWarnings=warn; } }
    bioSheetsState='done';
  }catch(e){ bioSheetsState='error'; }
}

function normBIO(s){
  const d=initBIO();
  s.patient=Object.assign(d.patient, s.patient||{});
  if(!s.selected || typeof s.selected!=='object') s.selected={};
  if(!s.open || typeof s.open!=='object') s.open=d.open;
  if(typeof s.clin!=='string') s.clin='';
  s.fast=!!s.fast;
  s.idel=!!s.idel;
  s.ald=!!s.ald;
  s.makaras=!!s.makaras;
  if(typeof s.poids!=='string') s.poids=(s.poids==null?'':String(s.poids));
  if(typeof s.taille!=='string') s.taille=(s.taille==null?'':String(s.taille));
  s.lithiumModel=!!(s.lithiumModel || s.lithiumRenew);
  if(!s.common || typeof s.common!=='object') s.common={};
  if(!s.commonOpen || typeof s.commonOpen!=='object') s.commonOpen={};
  if(typeof s.commonSearch!=='string') s.commonSearch='';
  /* migration des anciens modèles lithium vers le modèle générique */
  if(s.lithiumPreModel) s.common['lithiumPre']=true;
  if(s.lithiumDfgModel) s.common['lithiumDfg']=true;
  if(s.lithiumFollowModel) s.common['lithiumSuivi']=true;
  delete s.lithiumPreModel; delete s.lithiumDfgModel; delete s.lithiumFollowModel;
  s.lithiumRenew=!!s.lithiumRenew;
  if(typeof s.renewCount!=='string') s.renewCount=(s.renewCount==null?'':String(s.renewCount));
  if(typeof s.search!=='string') s.search='';
  if(typeof s.listText!=='string') s.listText='';
  s.listDirty=!!s.listDirty;
  return s;
}
function bioKey(ci,ii){ return 'c'+ci+'_i'+ii; }
function bioGroups(st){
  const groups=[];
  BIO_CATALOG.forEach((c,ci)=>{
    const its=[];
    c.items.forEach((label,ii)=>{ if(st.selected[bioKey(ci,ii)]) its.push(label); });
    if(its.length) groups.push({cat:c.cat,items:its,kind:c.kind||'blood',section:c.section||'',tdm:!!c.tdm,lithium:!!c.lithium});
  });
  return groups;
}
function bioSplitGroups(st){

}
function bioSelectExam(st, catName, itemName){

}

function bioListTextGenerated(st){
  const split=bioSplitGroups(st);
  const lines=[];
  lines.push(st.ald ? 'Section ALD — affection exonérante :' : 'Section hors ALD — affection intercurrente :');
  if(st.lithiumModel){ lines.push('', bioLithiumModelText(st)); }
  else {
    if(st.idel) lines.push(BIO_IDEL_SENTENCE);
  }
  if(st.fast){ lines.push('', 'À réaliser à jeun.'); }
  if(split.blood.length){
    lines.push('', 'Faire réaliser un bilan sanguin comprenant :');
    split.blood.forEach(g=>{ if(g.lithium){ lines.push('Lithium :'); lines.push(BIO_LITHIUM_CONDITION); lines.push('Par exemple : si prélèvement à 8h00, prise à 20h00 la veille.'); } g.items.forEach(i=>lines.push('- '+i)); });
  }
  if(split.urine.length){
    lines.push('', "Faire réaliser une analyse d'urine comprenant :");
    split.urine.forEach(g=>{ g.items.forEach(i=>lines.push('- '+i)); });
  }
  if(!st.lithiumModel && bioRenewCountClean(st)) lines.push('', bioRenewSentence(st));
  const clin=(st.clin||'').trim();
  if(clin) lines.push('', 'Renseignements cliniques :', clin);
  if(!split.blood.length && !split.urine.length && !st.lithiumModel) lines.push('', 'Aucun examen sélectionné.');
  lines.push('', BIO_RESULT_SENTENCE);
  return lines.join('\n');
}

      if(!wasActive){
        if(m.special){ st.lithiumModel=true; }
        else { st.common[id]=true; bioApplyExamList(st, m.exams); if(m.clin) st.clin=m.clin; }
      }
      const cl=document.getElementById('bioClin'); if(cl) cl.value=st.clin;
      st.listDirty=false; drawCats(); drawCommon(); updateAll(true);
    });
  }
  document.getElementById('bioCommonSearch').addEventListener('input',e=>{ st.commonSearch=e.target.value; drawCommon(); });
  document.getElementById('bioRenewCount').addEventListener('input',e=>{ st.renewCount=e.target.value.replace(/[^0-9]/g,''); e.target.value=st.renewCount; updateAll(false); });
  document.getElementById('bioSearch').addEventListener('input',e=>{ st.search=e.target.value; drawCats(); });
  document.getElementById('bioClear').onclick=()=>{
    st.selected={}; st.common={}; st.lithiumModel=false; st.lithiumRenew=false; st.renewCount=''; st.clin='';
    const cl=document.getElementById('bioClin'); if(cl) cl.value='';
    const rc=document.getElementById('bioRenewCount'); if(rc) rc.value='';
    st.listDirty=false; drawCats(); drawCommon(); updateAll(true);
  };
  const lt=document.getElementById('bioListText');
  lt.addEventListener('input',e=>{ st.listText=e.target.value; st.listDirty=true; });
  document.getElementById('bioRegen').onclick=()=>{ st.listDirty=false; updateAll(true); };
  document.getElementById('bioCopy').onclick=()=>copyText(lt.value,()=>{ const c=document.getElementById('bioCopied'); c.style.display='inline'; clearTimeout(renderBIO._t); renderBIO._t=setTimeout(()=>c.style.display='none',1600); });
  document.getElementById('bioPdf').onclick=()=>{
    const holder=document.createElement('div'); holder.id='bfPrintHolder'; holder.innerHTML=bioPrintableHTML(st);
    document.body.appendChild(holder); const prev=document.title; document.title=bioFilename(st,'Ordonnance_Biologie');
    document.body.classList.add('printing-bf'); window.print();
    setTimeout(()=>{ document.title=prev; document.body.classList.remove('printing-bf'); holder.remove(); },700);
  };
  document.getElementById('bioWord').onclick=()=>{
    const html='\ufeff'+bioPrintableHTML(st);
    downloadBlob(html, bioFilename(st,'Ordonnance_Biologie')+'.doc', 'application/msword;charset=utf-8');
    toast('Document Word généré.');
  };
  const grow=el=>{ el.style.height='auto'; el.style.height=(el.scrollHeight+2)+'px'; };
  root.querySelectorAll('textarea.grow').forEach(t=>{ grow(t); t.addEventListener('input',()=>grow(t)); });
  drawCats(); drawCommon(); updateAll(false);
  /* certains moteurs ne peignent pas le contenu d'un conteneur défilant au 1er rendu :
     on force un redessin sur la frame suivante (équivalent à ce que déclenche une saisie). */
  requestAnimationFrame(()=>{ if(commonBox){ commonBox.style.display='none'; void commonBox.offsetHeight; commonBox.style.display=''; } });
  if(bioSheetsState==='idle' && (BIO_SHEET_EXAMENS_CSV || BIO_SHEET_ORDONNANCES_CSV)){
    bioLoadSheets().then(()=>{ drawCats(); drawCommon(); updateAll(false); });
  }
}

function initGroup(m){
  const g=(m&&m[bioNorm('Génération')]||'').toLowerCase();
  const c=(m&&m[bioNorm('Classe chimique')]||'').toLowerCase();
  if(/thymor/.test(g)) return 'Thymorégulateurs';
  if(/addicto|addiction/.test(g)) return 'Traitements addicto';
  if(/antid[ée]presseur/.test(g)){
    if(/^\s*isrs/.test(c)) return 'Antidépresseurs — ISRS';
    if(/irsna|snri/.test(c)) return 'Antidépresseurs — IRSNa';
    if(/tca|tricyclique|t[ée]tracyclique/.test(c)) return 'Antidépresseurs — tricycliques';
    if(/imao/.test(c)) return 'Antidépresseurs — IMAO';
    return 'Antidépresseurs — autres';
  }
  if(/ap2g/.test(g)) return 'Antipsychotiques — 2ᵉ génération';
  if(/ap1g|neurolept/.test(g)) return 'Antipsychotiques — 1ʳᵉ génération';
  return 'Autres';
}
let initSheetState='idle';
function initCsvToRows(text){
  const table=bioParseCSV(text); if(table.length<2) return {rows:[],labels:{},order:[]};
  const orig=table[0].map(h=>(h||'').trim());
  const order=orig.map(h=>bioNorm(h)); const labels={};
  orig.forEach((h,i)=>{ labels[order[i]]=h; });
  const rows=table.slice(1).map(r=>{ const o={}; order.forEach((k,i)=>{ o[k]=(r[i]!=null?(''+r[i]).trim():''); }); return o; });
  return {rows, labels, order};
}
async function initLoadSheet(){
  if(initSheetState==='loading' || initSheetState==='done') return;
  if(!INIT_SHEET_CSV){ initSheetState='done'; return; }
  initSheetState='loading';
  try{
    const txt=await fetch(INIT_SHEET_CSV,{cache:'no-store'}).then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.text(); });
    const {rows,labels,order}=initCsvToRows(txt);
    const objs=rows.filter(o=> ((o.actif||'').toLowerCase()!=='non') && ((o.dci||o.molecule||'').trim()));
    if(objs.length){ INIT_MOLS=objs; INIT_LABELS=labels; INIT_ORDER=order; }

}
const INIT_ERR=/^#(REF|NAME|VALUE|ERROR|DIV\/0|N\/A|NA|NULL|NUM|SPILL|CALC|GETTING_DATA|UNKNOWN)[!?]?$/i;
function initClean(v){ v=(v==null?'':(''+v)).trim(); if(!v||INIT_ERR.test(v)) return ''; if(/^[—\-–\u2013\u2014\/.\s]+$/.test(v) || /^(n\/?a|nd|\?)$/i.test(v)) return ''; return v; }

function initMols(){ const seen=new Set(), out=[]; (INIT_MOLS||[]).forEach(m=>{ if(!m||!initName(m)) return; const k=initKey(m); if(seen.has(k)) return; seen.add(k); out.push(m); }); return out; }

function initGaleniques(str){
  return (str||'').split(/\n+/).map(l=>l.trim()).filter(Boolean).map(l=>{
    const p=l.split('|').map(x=>x.trim());
    return {forme:p[0]||'', dosage:p[1]||'', secable:/^(oui|o|1|true|s[\u00e9e]cable)$/i.test(p[2]||'')};
  });

function initLevel(v){
  const s=(''+v).toLowerCase().trim(); const head=s.slice(0,22);
  if(/^(pas de|peu|aucun|absent|nul|rare|tr[èe]s rare|faible|bas|minim|utile|ok|non|\u00f8|0\b|±|\+\/-|-\/\+)/.test(head)) return 'lvl-low';
  if(/\+\+\+/.test(s.slice(0,6)) || /^(élev|elev|haut|fort|marqu|toxic|majeur|important)/.test(head)) return 'lvl-high';
  if(/\+\+(?!\+)/.test(s.slice(0,6)) || /^(mod[ée]r|moyen)/.test(head)) return 'lvl-mod';
  if(/(faible|\brare\b|peu|minim|\u00f8|possible|absent|\bnul\b|pas de|aucun|utile)/.test(head) || /^\s*\+(?!\+)/.test(s)) return 'lvl-low';
  if(s.indexOf('+++')>=0) return 'lvl-high';
  if(s.indexOf('++')>=0) return 'lvl-mod';
  if(s.indexOf('+')>=0) return 'lvl-low';
  return 'lvl-na';
}

      if(sec.type==='identity') return;
      if(sec.type==='galenics'){
        const gv=initV(m,'Galéniques'); const fg=initV(m,'Formes galéniques');
        if(!gv && !fg) return;
        h+='<div class="init-block"><div class="init-block-h">'+esc(sec.title)+'</div>';
        if(gv){ const gals=initGaleniques(gv);
          h+='<div class="init-gals">'+gals.map(g=>'<div class="init-gal"><span class="ig-dose">'+esc([g.forme,g.dosage].filter(Boolean).join(' · '))+'</span>'+(g.secable?'<span class="ig-sec yes">✂ sécable</span>':'<span class="ig-sec no">non sécable</span>')+'</div>').join('')+'</div>'; }
        if(fg){ h+='<div class="init-f" style="margin-top:'+(gv?'9px':'0')+'"><div class="if-lab">Formes disponibles</div><div class="if-val">'+esc(fg).replace(/\n/g,'<br>')+'</div></div>'; }
        h+='</div>';
        return;
      }
      if(sec.type==='ordo'){
        let blocks=''; sec.cols.forEach(c=>{ const v=initV(m,c); if(v) blocks+=ordoBlock(INIT_LABELS[bioNorm(c)]||c, bioNorm(c), v); });
        if(blocks) h+='<div class="init-block"><div class="init-block-h">'+esc(sec.title)+'</div>'+blocks+'</div>';
        return;
      }
      if(sec.type==='annexe'){
        const at=initV(m,'Annexe — titre'), ac=initV(m,'Annexe — contenu'); if(!at && !ac) return;
        h+='<div class="init-annexe"><div class="init-block-h">'+esc(sec.title)+'</div>'
          +'<div class="init-annexe-title">'+esc(at||'Information au patient')+'</div>'
          +(ac?'<div class="init-annexe-prev">'+esc(ac).replace(/\n/g,'<br>')+'</div>':'')
          +'<div class="init-annexe-actions"><button type="button" class="btn" id="initAnnexeWord">'+ICONS.form+' Word</button><button type="button" class="btn ghost" id="initAnnexePrint">'+ICONS.print+' Imprimer</button><button type="button" class="btn ghost" id="initAnnexeCopy">'+ICONS.copy+' Copier</button></div></div>';
        return;
      }
      if(sec.type==='chips'){
        const items=[]; sec.cols.forEach(c=>{ const v=initV(m,c); if(v) items.push('<div class="tchip '+initLevel(v)+'"><span class="tc-lab">'+esc(INIT_LABELS[bioNorm(c)]||c)+'</span><span class="tc-val">'+esc(v)+'</span></div>'); });
        if(items.length) h+='<div class="init-block"><div class="init-block-h">'+esc(sec.title)+'</div><div class="init-tgrid">'+items.join('')+'</div></div>';
        return;
      }
      const fields=[]; sec.cols.forEach(c=>{ const v=initV(m,c); if(v) fields.push('<div class="init-f"><div class="if-lab">'+esc(INIT_LABELS[bioNorm(c)]||c)+'</div><div class="if-val">'+esc(v).replace(/\n/g,'<br>')+'</div></div>'); });
      if(fields.length) h+='<div class="init-block"><div class="init-block-h">'+esc(sec.title)+'</div><div class="init-fields">'+fields.join('')+'</div></div>';
    });
    const extra=[]; (INIT_ORDER||[]).forEach(k=>{ if(reserved.has(k)) return; const v=initClean(m[k]); if(v) extra.push('<div class="init-f"><div class="if-lab">'+esc(INIT_LABELS[k]||k)+'</div><div class="if-val">'+esc(v).replace(/\n/g,'<br>')+'</div></div>'); });
    if(extra.length) h+='<div class="init-block"><div class="init-block-h">Autres informations</div><div class="init-fields">'+extra.join('')+'</div></div>';
    const src=initV(m,'Source'); if(src) h+='<div class="init-source">Source : '+esc(src)+'</div>';
    detailBox.innerHTML=h;
    detailBox.querySelectorAll('.init-copy[data-ordo]').forEach(b=>b.onclick=()=>{ const t=initClean(m[b.dataset.ordo]); copyText(t,()=>{ const o=b.innerHTML; b.innerHTML=ICONS.copy+' Copié ✓'; setTimeout(()=>{b.innerHTML=o;},1400); }); });
    const wq=detailBox.querySelector('#initAnnexeWord'); if(wq) wq.onclick=()=>initAnnexeWord(m);
    const pq=detailBox.querySelector('#initAnnexePrint'); if(pq) pq.onclick=()=>initAnnexePrint(m);
    const cq=detailBox.querySelector('#initAnnexeCopy'); if(cq) cq.onclick=()=>copyText((initV(m,'Annexe — titre')? initV(m,'Annexe — titre')+'\n\n':'')+initV(m,'Annexe — contenu'), ()=>toast('Annexe copiée.'));
  }
  document.getElementById('initSearch').addEventListener('input',e=>{ st.search=e.target.value; drawList(); drawDetail(); });
  drawList(); drawDetail();
  requestAnimationFrame(()=>{ if(listBox){ listBox.style.display='none'; void listBox.offsetHeight; listBox.style.display=''; } });
  if(initSheetState==='idle' && INIT_SHEET_CSV){ initLoadSheet().then(()=>{ drawList(); drawDetail(); }); }
}

/* ============================================================
   ENREGISTREMENT / REPRISE (.json)
   ============================================================ */
function downloadJSON(obj, filename){
  const blob=new Blob([JSON.stringify(obj,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download=filename; document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); },0);
}
function safePatientName(){
  const p=session.patient;
  let nm=((p.nom||'')+'_'+(p.prenom||'')).normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^A-Za-z0-9_\-]/g,'').replace(/_+/g,'_').replace(/^_|_$/g,'');
  return nm||'patient';
}
function saveAll(){
  const obj={ app:'boiteaoutils', v:1, ts:new Date().toISOString(), patient:session.patient, doctor:session.doctor, state:STATE };
  downloadJSON(obj, 'BoiteAOutils_'+safePatientName()+'_'+stampNow()+'.json');
  toast('Boîte à outils enregistrée (.json).');
}
function saveTool(id){
  if(!id || !STATE[id]){ toast('Ouvrez un outil d\'abord.'); return; }
  const obj={ app:'boiteaoutils-tool', v:1, ts:new Date().toISOString(), tool:id, patient:session.patient, doctor:session.doctor, state:STATE[id] };
  downloadJSON(obj, id+'_'+safePatientName()+'_'+stampNow()+'.json');
  toast('Outil enregistré (.json).');
}
function resumeFromFile(file){
  const rd=new FileReader();
  rd.onload=()=>{
    let obj; try{ obj=JSON.parse(rd.result); }catch(e){ toast('Fichier illisible.'); return; }
    if(obj && obj.app==='boiteaoutils'){
      if(obj.patient) session.patient=Object.assign({nom:"",prenom:"",sexe:"",naissance:""},obj.patient);
      if(obj.doctor)  session.doctor =Object.assign({nom:DEFAULT_DOCTOR},obj.doctor);
      if(obj.state && typeof obj.state==='object'){ Object.keys(STATE).forEach(k=>delete STATE[k]); Object.assign(STATE,obj.state); }
      session.current=null; render(); toast('Boîte à outils reprise.');
    } else if(obj && obj.app==='boiteaoutils-tool' && obj.tool){
      if(obj.state) STATE[obj.tool]=obj.state;
      const P=session.patient;
      if(obj.patient && !P.nom && !P.prenom && !P.sexe && !P.naissance) session.patient=Object.assign({nom:"",prenom:"",sexe:"",naissance:""},obj.patient);
      if(obj.doctor && !(session.doctor.nom||'').trim()) session.doctor=Object.assign({nom:DEFAULT_DOCTOR},obj.doctor);
      if(TOOLS[obj.tool] && isReady(TOOLS[obj.tool])){ openTool(obj.tool); } else { session.current=null; render(); }
      toast('Outil repris.');
    } else {
      toast('Fichier non reconnu.');
    }
  };
  rd.readAsText(file);
}

/* ============================================================
   TOAST / MODAL / NAV (helpers réutilisables)
   ============================================================ */
function toast(msg){ toastEl.textContent=msg; toastEl.classList.add('show'); clearTimeout(toast._t); toast._t=setTimeout(()=>toastEl.classList.remove('show'),2600); }
function showModal(html){ modalbox.innerHTML=html; modal.classList.add('show'); }
function closeModal(){ modal.classList.remove('show'); }
modal.addEventListener('click',e=>{ if(e.target===modal) closeModal(); });

const scrim=document.getElementById('scrim');
function openNav(){document.body.classList.add('nav-open');}
function closeNav(){document.body.classList.remove('nav-open');}
document.getElementById('hamb').onclick=()=>document.body.classList.toggle('nav-open');
scrim.onclick=closeNav;
document.getElementById('brandHome').onclick=goHome;

/* Enregistrer / Reprendre */
const fileInput=document.getElementById('fileInput');
const popSave=document.getElementById('popSave');
function closeSavePop(){ popSave.classList.remove('show'); }
function refreshSavePop(){
  const it=popSave.querySelector('.pitem[data-scope="tool"]');
  const t=session.current?TOOLS[session.current]:null;
  document.getElementById('saveToolT').textContent = t?('Cet outil : '+t.title+' (.json)'):'Cet outil (.json)';
  document.getElementById('saveToolS').textContent = t?('État de '+t.title):'Ouvrez un outil d\'abord';
  if(it) it.disabled=!t;
}
document.getElementById('btnSave').onclick=e=>{ e.stopPropagation(); refreshSavePop(); popSave.classList.toggle('show'); };
popSave.querySelectorAll('.pitem').forEach(b=>b.onclick=()=>{ const sc=b.dataset.scope; closeSavePop(); if(sc==='all') saveAll(); else saveTool(session.current); });
document.getElementById('btnResume').onclick=()=>{ closeSavePop(); fileInput.value=''; fileInput.click(); };
fileInput.onchange=e=>{ const f=e.target.files[0]; if(f) resumeFromFile(f); };
document.addEventListener('click',e=>{ if(!e.target.closest('.tools')) closeSavePop(); });

/* ============================================================
   DÉMARRAGE
   ============================================================ */
applyAccent(HOME_PAL);
render();
</script>
