<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Boîte à outils — CMP & gardes</title>
<style>
:root{
  --topbar-h:58px;
  --bg:#f3f1fb; --paper:#ffffff; --soft-bg:#faf9ff; --line:#e3def0;
  --ink:#1f2540; --ink-soft:#5b6178; --muted:#8a8f9e;
  /* Accent piloté par section (par défaut : violet "accueil", palette flash) */
  --accent:#7c3aed; --accent-d:#5b21b6; --accent-l:#a78bfa;
  --tint:color-mix(in srgb,var(--accent) 14%,#fff);
  --soft:color-mix(in srgb,var(--accent) 7%,#fff);
  --accent-ink:color-mix(in srgb,var(--accent-d) 88%,#000);
  --danger:#dc2626; --danger-soft:#fef2f2; --danger-line:#fbd5d5; --danger-ink:#7f1d1d;
  --ok:#059669; --ok-soft:#e7f6ef;
  --shadow:0 1px 2px rgba(31,37,64,.06),0 10px 26px rgba(31,37,64,.08);
  --shadow-lg:0 6px 14px rgba(31,37,64,.10),0 20px 44px rgba(31,37,64,.12);
  --font:"Segoe UI",system-ui,-apple-system,Roboto,"Helvetica Neue",Arial,sans-serif;
  --radius:16px;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{margin:0;font-family:var(--font);color:var(--ink);background:var(--bg);font-size:15px;line-height:1.55}
a{color:var(--accent-d)}
button{font-family:inherit}

/* ===== Barre supérieure ===== */
.topbar{position:sticky;top:0;z-index:60;background:rgba(243,241,251,.92);backdrop-filter:saturate(1.3) blur(8px);border-bottom:1px solid var(--line)}
.topbar .inner{max-width:1240px;margin:0 auto;display:flex;align-items:center;gap:10px;padding:8px 16px}
.hamburger{display:none;background:#fff;border:1px solid var(--line);border-radius:10px;width:38px;height:36px;cursor:pointer;align-items:center;justify-content:center;color:var(--accent-d)}
.hamburger svg{width:19px;height:19px}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;color:var(--accent-d);font-size:15px;background:none;border:0;cursor:pointer;padding:4px 2px}
.brand .logo{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;color:#fff;flex:none;
  background:linear-gradient(135deg,var(--accent-l),var(--accent-d));box-shadow:0 2px 8px color-mix(in srgb,var(--accent) 40%,transparent)}
.brand .logo svg{width:17px;height:17px}
.brand .tag{font-size:10px;font-weight:800;color:#fff;background:var(--accent);padding:2px 9px;border-radius:999px;letter-spacing:.05em;text-transform:uppercase}
.topbar .spacer{flex:1}
.topbar .ctx{font-size:12.5px;font-weight:700;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ===== Mise en page : sidebar + main ===== */
.layout{max-width:1240px;margin:0 auto;display:flex;align-items:flex-start}
.sidebar{width:262px;flex:none;align-self:stretch;padding:16px 14px 40px;position:sticky;top:var(--topbar-h);max-height:calc(100vh - var(--topbar-h));overflow:auto}
.sb-h{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:16px 8px 7px}
.sb-link{display:flex;align-items:center;gap:10px;width:100%;text-align:left;border:1px solid transparent;background:none;cursor:pointer;padding:9px 10px;border-radius:11px;color:var(--ink);font-size:14px}
.sb-link:hover{background:#fff;border-color:var(--line)}
.sb-link.active{background:#fff;border-color:var(--accent-l);box-shadow:var(--shadow)}
.sb-link .dot{width:11px;height:11px;border-radius:50%;flex:none;background:var(--sc,#9aa0b4);box-shadow:0 0 0 3px color-mix(in srgb,var(--sc,#9aa0b4) 20%,#fff)}
.sb-link .lab{flex:1;min-width:0}
.sb-link .lab .nm{font-weight:700;line-height:1.15}
.sb-link .soon{font-size:9.5px;font-weight:800;letter-spacing:.03em;text-transform:uppercase;color:var(--muted);background:#eef0f4;border-radius:999px;padding:2px 7px;flex:none}
.sb-link.home-link{font-weight:700;color:var(--accent-d)}
.sb-link.home-link svg{width:17px;height:17px}
.sb-foot{margin:20px 8px 0;font-size:11.5px;color:var(--muted);line-height:1.5}
.sb-credit{margin-top:12px;padding-top:10px;border-top:1px solid var(--line);font-size:10.5px;color:#a7adbe;line-height:1.45;font-style:italic}
.sb-credit sup{font-style:normal}

main{flex:1;min-width:0;max-width:1000px;margin:0 auto;padding:22px 18px 120px}
.scrim{display:none}

/* ===== Masthead ===== */
.masthead{text-align:center;margin:8px 0 22px}
.masthead .kicker{font-size:11px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--accent-l)}
.masthead h1{margin:9px 0 0;font-size:32px;font-weight:800;letter-spacing:-.015em;color:var(--accent-d);line-height:1.08}
.masthead .subtitle{margin:7px auto 0;color:var(--ink-soft);font-size:14px;font-weight:600;max-width:560px}
.masthead .rule{width:56px;height:4px;border-radius:4px;margin:15px auto 0;background:linear-gradient(90deg,var(--accent-l),var(--accent-d))}
.masthead .lead{margin:14px auto 0;color:var(--ink-soft);font-weight:600;font-size:14.5px;max-width:580px}
@media(max-width:620px){.masthead h1{font-size:26px}}

.note{background:var(--soft);border:1px solid var(--line);border-left:5px solid var(--accent);border-radius:12px;padding:12px 15px;color:#4a4f66;font-size:13.6px;margin:14px 0 20px}
.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px clamp(16px,3vw,26px);margin:0 0 18px}
.card h2{margin:0 0 4px;font-size:18px;color:var(--accent-d)}
.muted{color:var(--ink-soft);font-size:13px}

/* ===== Accueil : sections + tuiles d'outils ===== */
.sec{margin:0 0 26px}
.sec-head{display:flex;align-items:center;gap:12px;margin:0 2px 12px}
.sec-ic{width:40px;height:40px;border-radius:12px;flex:none;display:grid;place-items:center;color:#fff;
  background:linear-gradient(135deg,var(--sc-l),var(--sc-d));box-shadow:0 3px 10px color-mix(in srgb,var(--sc) 34%,transparent)}
.sec-ic svg{width:21px;height:21px}
.sec-title{flex:1;min-width:0}
.sec-title .nm{font-size:17px;font-weight:800;color:var(--sc-d);line-height:1.15}
.sec-title .bl{font-size:12.8px;color:var(--ink-soft);margin-top:1px}
.sec-count{font-size:11px;font-weight:800;color:var(--muted);white-space:nowrap}

.tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:12px}
.tile{position:relative;text-align:left;border:1px solid var(--line);background:var(--paper);border-radius:14px;padding:15px 16px 15px 18px;
  cursor:pointer;font:inherit;color:var(--ink);display:flex;flex-direction:column;gap:5px;min-height:92px;overflow:hidden;transition:transform .12s,box-shadow .12s,border-color .12s}
.tile::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--sc,#9aa0b4)}
.tile:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:color-mix(in srgb,var(--sc) 45%,#fff)}
.tile .t-top{display:flex;align-items:center;gap:9px}
.tile .t-nm{font-weight:800;font-size:15px;color:var(--sc-d,var(--ink))}
.tile .t-sub{font-size:12.6px;color:var(--ink-soft);line-height:1.35}
.tile .t-badge{margin-left:auto;font-size:10px;font-weight:800;letter-spacing:.03em;text-transform:uppercase;padding:3px 9px;border-radius:999px;white-space:nowrap}
.tile .t-badge.ready{background:color-mix(in srgb,var(--sc) 16%,#fff);color:var(--sc-d)}
.tile .t-badge.soon{background:#eef0f4;color:var(--muted)}
.tile.soon{cursor:default;background:var(--soft-bg)}
.tile.soon:hover{transform:none;box-shadow:none;border-color:var(--line)}
.tile.soon .t-nm{color:var(--ink-soft)}
.tile.soon::before{opacity:.4}

/* ===== Boutons génériques ===== */
.actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:18px}
.actions .spacer{flex:1}
.btn{font:inherit;border:1px solid var(--accent);background:var(--accent);color:#fff;font-weight:600;padding:11px 22px;border-radius:11px;cursor:pointer;display:inline-flex;align-items:center;gap:7px}
.btn:hover{background:var(--accent-d);border-color:var(--accent-d)}
.btn.ghost{background:#fff;color:var(--accent-d);border-color:var(--line)}
.btn.ghost:hover{border-color:var(--accent-l)}
.btn.danger{background:#fff;border-color:var(--danger-line);color:var(--danger-ink)}
.btn.danger:hover{background:var(--danger-soft)}
.btn svg{width:16px;height:16px}
.backbtn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:#fff;color:var(--accent-d);font-weight:700;font-size:13px;padding:8px 14px;border-radius:10px;cursor:pointer;margin-bottom:16px}
.backbtn:hover{border-color:var(--accent-l)}
.backbtn svg{width:15px;height:15px}

/* ===== Champs de formulaire (outils) ===== */
input[type=text],input[type=date],textarea,select{width:100%;font:inherit;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px 11px}
input:focus,textarea:focus,select:focus{outline:2px solid var(--accent-l);outline-offset:1px;border-color:var(--accent-l)}
.field{margin:0}
.field label{font-weight:600;display:block;margin-bottom:4px;font-size:12.5px;color:var(--ink-soft)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* identité */
.idrow{display:grid;grid-template-columns:1fr 1fr auto;gap:12px;align-items:end}
.sexe,.sud-wrap{display:flex;flex-direction:column;gap:4px}
.chips{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:#fff;width:max-content}
.chips button{border:0;background:#fff;padding:9px 16px;font:inherit;font-weight:700;font-size:13px;color:var(--ink-soft);cursor:pointer}
.chips button+button{border-left:1px solid var(--line)}
.chips button.on{background:var(--accent);color:#fff}
.chips .lab,.sexe .lab,.sud-wrap .lab{font-weight:600;font-size:12.5px;color:var(--ink-soft)}

/* ===== Onglets (sous-navigation d'outil) ===== */
.tabs{display:inline-flex;background:#fff;border:1px solid var(--line);border-radius:999px;padding:3px;gap:3px;margin:2px 0 16px;max-width:100%;overflow:auto}
.tab{border:0;background:none;cursor:pointer;font-weight:700;font-size:13.5px;color:var(--ink-soft);padding:9px 18px;border-radius:999px;white-space:nowrap;line-height:1.1}
.tab.on{background:var(--accent);color:#fff;box-shadow:0 1px 3px rgba(31,37,64,.2)}
.tab:not(.on):hover{color:var(--accent-d)}

/* ===== Consigne / protocole ===== */
.consigne{background:var(--tint);border:1px solid color-mix(in srgb,var(--accent) 30%,#fff);border-radius:12px;padding:11px 15px;color:var(--accent-ink);font-size:13.6px;font-weight:600;margin:0 0 14px;line-height:1.5}
details.proto{background:#fff;border:1px solid var(--line);border-radius:12px;margin:0 0 16px;overflow:hidden}
details.proto>summary{cursor:pointer;list-style:none;padding:12px 15px;font-weight:800;color:var(--accent-d);font-size:14px;display:flex;align-items:center;gap:9px}
details.proto>summary::-webkit-details-marker{display:none}
details.proto>summary svg{width:16px;height:16px;flex:none}
details.proto>summary .caret{margin-left:auto;transition:.2s;font-size:11px;color:var(--muted)}
details.proto[open]>summary .caret{transform:rotate(180deg)}
.proto .pbody{padding:0 15px 12px}
.proto ol{margin:0;padding-left:20px}
.proto li{font-size:12.8px;color:#3a3f57;margin:7px 0;line-height:1.45}
.proto li b{color:var(--accent-d)}

/* ===== Sémiologie : signes ===== */
.sign-list{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sign{display:flex;align-items:flex-start;gap:11px;border:1px solid var(--line);border-radius:12px;padding:11px 13px;background:#fff;cursor:pointer;text-align:left;font:inherit;transition:border-color .12s,background .12s}
.sign:hover{border-color:var(--accent-l)}
.sign.on{border-color:var(--accent);background:var(--tint)}
.sign .box{flex:none;width:20px;height:20px;border-radius:6px;border:2px solid var(--accent-l);background:#fff;margin-top:1px;position:relative}
.sign.on .box{background:var(--accent);border-color:var(--accent-d)}
.sign.on .box::after{content:"";position:absolute;left:5px;top:1px;width:6px;height:11px;border:solid #fff;border-width:0 2.5px 2.5px 0;transform:rotate(45deg)}
.sign .nm{font-weight:700;font-size:14px;color:var(--ink)}
.sign .ds{display:block;font-size:12px;color:var(--ink-soft);line-height:1.35;margin-top:2px}

/* compteur / flag */
.count-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:4px}
.count-big{font-size:34px;font-weight:800;color:var(--accent-d);letter-spacing:-.02em}
.count-big small{font-size:15px;color:var(--ink-soft);font-weight:600}
.flag{border-radius:10px;padding:9px 14px;font-weight:800;font-size:14px;border:1px solid}
.flag.on{background:#fef2f2;color:#b42318;border-color:#fbd5d5}
.flag.off{background:var(--ok-soft);color:#256b4b;border-color:#c4e4d2}
.rule-hint{font-size:12.5px;color:var(--ink-soft);margin-top:10px;line-height:1.5}
.rule-hint b{color:var(--accent-d)}

/* constantes */
.const-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* observation */
.obs-box textarea{min-height:150px;resize:vertical;line-height:1.5;font-size:14px}
.obs-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;align-items:center}
.copied{color:var(--ok);font-weight:800;font-size:13px}

/* ===== Cotation BFCRS ===== */
.scale-name{display:flex;align-items:center;gap:10px;font-weight:800;font-size:15px;color:var(--accent-d);background:var(--soft);border:1px solid var(--line);border-left:5px solid var(--accent);border-radius:12px;padding:11px 15px;margin:0 0 14px}
.scale-name .sn-tag{margin-left:auto;font-size:11px;font-weight:800;letter-spacing:.04em;color:#fff;background:var(--accent);border-radius:999px;padding:3px 10px;white-space:nowrap}
.score-sticky{position:sticky;top:var(--topbar-h);z-index:20;background:color-mix(in srgb,var(--bg) 80%,#fff);backdrop-filter:blur(6px);border:1px solid var(--line);border-radius:12px;padding:10px 15px;margin:0 0 14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.score-sticky .stot{font-size:22px;font-weight:800;color:var(--accent-d);white-space:nowrap}
.score-sticky .stot small{font-size:13px;color:var(--ink-soft);font-weight:600}
.score-sticky .schip{font-size:12px;font-weight:700;color:var(--ink-soft);background:#fff;border:1px solid var(--line);border-radius:999px;padding:4px 11px;white-space:nowrap}
.score-sticky .bar{flex:1;min-width:90px;height:9px;border-radius:99px;background:var(--soft);position:relative;overflow:hidden}
.score-sticky .bar .f{position:absolute;left:0;top:0;bottom:0;border-radius:99px;background:linear-gradient(90deg,var(--accent-l),var(--accent-d));width:0;transition:width .18s}
.score-sticky .pbtn{margin-left:auto;padding:8px 14px}

.bf-item{border:1px solid var(--line);border-radius:14px;background:#fff;padding:13px 15px;margin:0 0 11px}
.bf-item .ihead{display:flex;align-items:baseline;gap:10px}
.bf-item .inum{flex:none;min-width:26px;height:24px;padding:0 7px;border-radius:8px;background:var(--tint);color:var(--accent-d);font-weight:800;font-size:13px;display:inline-flex;align-items:center;justify-content:center}
.bf-item .inom{font-weight:800;font-size:14px;color:var(--accent-d);letter-spacing:.01em}
.bf-item .idesc{font-size:12.5px;color:var(--ink-soft);line-height:1.4;margin:5px 0 9px}
.bf-opts{display:flex;flex-direction:column;gap:5px}
.bf-opt{display:flex;align-items:flex-start;gap:10px;border:1px solid var(--line);border-radius:9px;padding:7px 10px;cursor:pointer;background:#fff;text-align:left;font:inherit;transition:.1s}
.bf-opt:hover{border-color:var(--accent-l);background:var(--soft)}
.bf-opt.on{border-color:var(--accent);background:var(--tint)}
.bf-opt .os{flex:none;width:22px;height:22px;border-radius:7px;background:#eef0f4;color:var(--ink-soft);font-weight:800;font-size:13px;display:grid;place-items:center}
.bf-opt.on .os{background:var(--accent);color:#fff}
.bf-opt .ol{font-size:12.8px;color:var(--ink);line-height:1.35}
.bf-item.two .bf-opts{flex-direction:row;gap:8px}
.bf-item.two .bf-opt{flex:1}

/* carte score bas */
.score-card .big{font-size:40px;font-weight:800;color:var(--accent-d);letter-spacing:-.02em}
.score-card .big small{font-size:17px;color:var(--ink-soft);font-weight:600}
.score-card .subs{display:flex;gap:24px;flex-wrap:wrap;margin-top:6px}
.score-card .subs .n{font-size:22px;font-weight:800;color:var(--ink)}
.score-card .subs .k{font-size:12px;color:var(--ink-soft);font-weight:700;text-transform:uppercase;letter-spacing:.03em}

/* ===== Toast + Modal ===== */
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:12px;font-size:13.5px;font-weight:600;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.25s;z-index:95;max-width:90vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.modal{position:fixed;top:0;right:0;bottom:0;left:0;background:rgba(31,37,64,.42);display:none;place-items:center;z-index:90;padding:20px}
.modal.show{display:grid}
.modalbox{background:#fff;border-radius:16px;max-width:470px;width:100%;padding:24px;box-shadow:var(--shadow-lg)}
.modalbox h2{margin:0 0 8px;font-size:18px;color:var(--accent-d)}
.modalbox p{margin:0 0 18px;color:var(--ink);line-height:1.5}
.modalbox .mf{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}

.sitefoot{text-align:center;font-size:11px;color:#a7adbe;padding:18px 16px 26px;line-height:1.5;border-top:1px solid var(--line);margin-top:8px;font-style:italic}
.sitefoot sup{font-style:normal}

/* ===== Outils topbar (Enregistrer / Reprendre) ===== */
.tools{display:flex;gap:8px;align-items:center;position:relative}
.tbtn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:#fff;color:var(--ink);font-weight:700;font-size:12.5px;padding:7px 12px;border-radius:10px;cursor:pointer;white-space:nowrap}
.tbtn:hover{border-color:var(--accent-l)}
.tbtn .ic{display:inline-flex}
.tbtn .ic svg{width:16px;height:16px}
.tbtn .caret{font-size:10px;color:var(--muted)}
.pop{position:absolute;top:calc(100% + 6px);right:0;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow-lg);padding:6px;min-width:262px;z-index:70;display:none}
.pop.show{display:block}
.pop .pitem{display:flex;flex-direction:column;gap:1px;width:100%;text-align:left;border:0;background:none;cursor:pointer;padding:9px 11px;border-radius:9px}
.pop .pitem:hover{background:var(--soft)}
.pop .pitem:disabled{opacity:.45;cursor:not-allowed}
.pop .pitem .t{font-weight:700;font-size:13.5px;color:var(--ink)}
.pop .pitem .s{font-size:12px;color:var(--ink-soft)}

/* ===== Identité (accueil) ===== */
.id-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:0 0 18px}
.id-cards .card{margin:0}
.id-cards .card h2{font-size:16px}
@media(max-width:760px){ .id-cards{grid-template-columns:1fr} }
@media(max-width:520px){
  .tbtn .tl{display:none}
  .tbtn{padding:7px 10px}
  .brand .tag{display:none}
  .brand{font-size:14px;gap:7px}
}

/* ===== Certificat MDPH ===== */
.cerfa-nav{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 16px}
.cerfa-nav span{font-size:12px;font-weight:700;padding:6px 12px;border-radius:999px;background:#fff;border:1px solid var(--line);color:var(--muted)}
.cerfa-nav span.on{background:var(--accent);border-color:var(--accent);color:#fff}
.q-row{display:flex;align-items:center;gap:16px;padding:12px 0;border-top:1px solid var(--line)}
.q-row:first-of-type{border-top:0;padding-top:2px}
.q-txt{flex:1;font-size:13.6px;color:var(--ink);line-height:1.45}
.q-row .chips{flex:none}
@media(max-width:620px){ .q-row{flex-direction:column;align-items:flex-start;gap:9px} }
.cerfa-nav [data-go]{cursor:pointer}
.cerfa-nav [data-go]:hover{border-color:var(--accent);color:var(--accent)}
.cerfa-nav span.mut{opacity:.6}
section[id^="cerfa-p"]{scroll-margin-top:76px;display:block}

/* pastilles d'options (radio) */
.optset{display:flex;flex-wrap:wrap;gap:8px}
.optset button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 15px;font:inherit;font-weight:600;font-size:13px;color:var(--ink-soft);cursor:pointer;transition:.12s}

.optset button.on{background:var(--accent);border-color:var(--accent);color:#fff}

/* cases à cocher */
.chk-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:6px}

.chkbtn{display:inline-flex;align-items:center;gap:10px;border:1px solid var(--line);background:#fff;border-radius:11px;padding:10px 13px;font:inherit;font-size:13.4px;font-weight:600;color:var(--ink);cursor:pointer;text-align:left;line-height:1.35}

.chkbtn .bx{width:19px;height:19px;border-radius:5px;border:2px solid var(--accent-l);flex:none;position:relative}

.chkbtn.on .bx{background:var(--accent);border-color:var(--accent)}
.chkbtn.on .bx::after{content:"";position:absolute;left:5px;top:1px;width:5px;height:10px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}

/* holder d'impression (masqué à l'écran) */
#bfPrintHolder{display:none}

/* ===== Impression ===== */
@media print{
  @page{size:A4;margin:12mm}
  .topbar,.sidebar,.no-print,.scrim,.backbtn,.actions,.hamburger{display:none!important}
  body{background:#fff;font-size:10px}
  .layout{display:block}
  main{padding:0;max-width:none;margin:0}
  /* impression ciblée Bush-Francis : ne montrer que le holder */
  body.printing-bf>*{display:none!important}
  body.printing-bf #bfPrintHolder{display:block!important}
  #bfPrintHolder *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .bfp{color:#20233a;line-height:1.3}
  .bfp-head{background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff;border-radius:10px;padding:10px 14px;margin-bottom:8px}
  .bfp-title{font-size:14.5px;font-weight:800;display:flex;align-items:center;gap:9px}
  .bfp-title .sn-tag{font-size:9px;font-weight:800;letter-spacing:.05em;background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.55);border-radius:999px;padding:2px 9px}
  .bfp-meta{font-size:9.5px;margin-top:4px;color:#ede9fb}
  .bfp-consigne{font-size:8.5px;font-style:italic;color:#5b6178;margin:0 2px 7px}
  .bfp-grid{column-count:2;column-gap:15px;font-size:9px}
  .bfp-item{break-inside:avoid;display:flex;flex-wrap:wrap;gap:3px 7px;padding:3px 6px;margin-bottom:3px;border-radius:6px;align-items:baseline;background:#faf9ff;border:1px solid #ece8f8}
  .bfp-n{font-weight:800;color:#5b21b6;min-width:16px}
  .bfp-nom{font-weight:800;flex:1;min-width:0;color:#3a2c63}
  .bfp-sc{font-weight:800;border-radius:5px;padding:0 7px;min-width:15px;text-align:center}
  .bfp-sc.none{background:#eef0f4;color:#8a8f9e}

function todayISO(){const t=new Date();const z=n=>String(n).padStart(2,'0');return t.getFullYear()+'-'+z(t.getMonth()+1)+'-'+z(t.getDate());}
function frDate(iso){ if(!iso) return '—'; const m=/^(\d{4})-(\d{2})-(\d{2})$/.exec(iso); return m?(m[3]+'/'+m[2]+'/'+m[1]):iso; }
function timeNow(){ const t=new Date();const z=n=>String(n).padStart(2,'0'); return z(t.getHours())+'h'+z(t.getMinutes()); }
function stampNow(){ const t=new Date();const z=n=>String(n).padStart(2,'0'); return t.getFullYear()+'-'+z(t.getMonth()+1)+'-'+z(t.getDate())+'_'+z(t.getHours())+'h'+z(t.getMinutes()); }
function joinFr(a){ if(!a.length) return ''; if(a.length===1) return a[0]; return a.slice(0,-1).join(', ')+' et '+a[a.length-1]; }
function copyText(txt,doneCb){
  const done=()=>{ if(doneCb) doneCb(); };
  if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(done,()=>fallbackCopy(txt,done)); }
  else fallbackCopy(txt,done);
}
function fallbackCopy(txt,cb){ const t=document.createElement('textarea'); t.value=txt; t.style.position='fixed'; t.style.opacity='0'; document.body.appendChild(t); t.focus(); t.select(); try{document.execCommand('copy');}catch(e){} t.remove(); if(cb)cb(); }

let _pdflibPromise = null;
function ensurePDFLib(){
  if(window.PDFLib) return Promise.resolve(window.PDFLib);
  if(_pdflibPromise) return _pdflibPromise;
  _pdflibPromise = new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js';
    s.onload=()=>res(window.PDFLib);
    s.onerror=()=>rej(new Error('pdf-lib introuvable (connexion requise pour la 1re génération)'));
    document.head.appendChild(s);
  });
  return _pdflibPromise;
}
function downloadBlob(data, filename, mime){
  const blob=new Blob([data],{type:mime||'application/octet-stream'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download=filename; document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); },0);
}

function eqStarSVG(vals, color){
  const R=44, C=58, N=5, MAX=5;
  const ang=i=>-Math.PI/2 + i*2*Math.PI/N;
  const pt=(i,r)=>[C+r*Math.cos(ang(i)), C+r*Math.sin(ang(i))];
  let g='';
  for(let ring=1;ring<=MAX;ring++){ const p=[]; for(let i=0;i<N;i++){ const q=pt(i,R*ring/MAX); p.push(q[0].toFixed(1)+','+q[1].toFixed(1)); } g+='<polygon points="'+p.join(' ')+'" fill="none" stroke="#e6e8ef" stroke-width="0.7"/>'; }
  let ax='';
  for(let i=0;i<N;i++){ const e=pt(i,R); ax+='<line x1="'+C+'" y1="'+C+'" x2="'+e[0].toFixed(1)+'" y2="'+e[1].toFixed(1)+'" stroke="#e6e8ef" stroke-width="0.7"/>';
    const l=pt(i,R+12); ax+='<text x="'+l[0].toFixed(1)+'" y="'+l[1].toFixed(1)+'" font-size="7" fill="#64748b" text-anchor="middle" dominant-baseline="middle">'+esc(EQ_STAR_AXES[i])+'</text>'; }
  const dp=[]; for(let i=0;i<N;i++){ const q=pt(i,R*(vals[i]||0)/MAX); dp.push(q[0].toFixed(1)+','+q[1].toFixed(1)); }
  let dots=''; for(let i=0;i<N;i++){ const q=pt(i,R*(vals[i]||0)/MAX); dots+='<circle cx="'+q[0].toFixed(1)+'" cy="'+q[1].toFixed(1)+'" r="1.7" fill="'+color+'"/>'; }
  return '<svg viewBox="0 0 116 116" width="158" height="158" role="img" aria-label="profil pharmacologique">'
    +g+ax+'<polygon points="'+dp.join(' ')+'" fill="'+color+'" fill-opacity="0.22" stroke="'+color+'" stroke-width="1.6"/>'+dots+'</svg>';
}

function eqRecCell(p,k){
  const v=p&&p[k]; if(!v) return '<span class="eqr-none">—</span>';
  const m=EQ_ACT[v[0]]||EQ_ACT.ant; let dots='';
  for(let i=1;i<=3;i++) dots+='<span class="eqr-dot'+(i<=v[1]?' on':'')+'"></span>';
  return '<span class="eqr-badge" style="--rc:'+m.c+'">'+m.l+' <span class="eqr-dots">'+dots+'</span></span>';
}
function apReceptorHTML(fromName,toName){
  const F=AP_REC[fromName], T=AP_REC[toName];
  if(!F||!T) return '';
  if(fromName===toName) return '<div class="card eqr-card"><div class="card-head"><h2>Profils récepteurs</h2><span class="eyebrow">d\'après Stahl</span></div><div class="card-body"><p class="hint" style="margin:0">Choisissez deux molécules <b>différentes</b> pour comparer leurs profils de liaison et les points de vigilance au changement.</p></div></div>';
  let rows='';
  EQ_REC_META.forEach(r=>{ if(!F[r.k]&&!T[r.k]) return;
    rows+='<div class="eqr-row"><div class="eqr-rec"><b>'+r.lab+'</b><span>'+r.tag+'</span></div>'
      +'<div class="eqr-cell">'+eqRecCell(F,r.k)+'</div><div class="eqr-arrow">→</div><div class="eqr-cell">'+eqRecCell(T,r.k)+'</div></div>';
  });
  const S=(p,k)=>p[k]?p[k][1]:0, A=(p,k)=>p[k]?p[k][0]:null;
  const W=[];
  if(A(F,'D2')==='ant'&&A(T,'D2')==='pa') W.push(['high','Passage d\'un antagoniste D2 à un <b>agoniste partiel</b> ('+esc(toName)+') : risque de psychose, d\'agitation et d\'akathisie de rebond (hypersensibilité dopaminergique). Chevauchement lent (plateau) ; ne pas arrêter brutalement l\'ancien traitement.']);
  if(A(T,'D2')==='ant'&&S(T,'D2')-S(F,'D2')>=2) W.push(['med','Blocage D2 nettement plus puissant → risque accru de <b>syndrome extrapyramidal / akathisie</b> et d\'hyperprolactinémie.']);
  if(S(F,'5HT2A')>=2&&S(T,'5HT2A')<=1&&A(T,'D2')==='ant'&&S(T,'D2')>=2) W.push(['med','Perte de l\'antagonisme 5-HT2A (caractère « atypique ») associée à un fort blocage D2 → risque accru de SEP.']);
  if(S(F,'M1')>=2&&S(T,'M1')<=1) W.push(['high','Perte de l\'effet anticholinergique (M1) → <b>rebond cholinergique</b> possible (insomnie, agitation, nausées, sueurs, syndrome pseudo-grippal) et démasquage de SEP. Décroissance progressive ; un anticholinergique transitoire peut aider.']);
  if(S(T,'M1')>=2&&S(F,'M1')<=1) W.push(['info','Ajout d\'un effet anticholinergique marqué (bouche sèche, constipation, troubles cognitifs, rétention) — prudence chez le sujet âgé.']);
  if(Math.max(S(F,'H1'),S(F,'a1'))>=3&&Math.max(S(T,'H1'),S(T,'a1'))<=1) W.push(['med','Perte de la sédation (H1/α1) → <b>insomnie / activation de rebond</b> possible au changement. Prévoir la couverture du sommeil.']);
  if((S(T,'H1')>=3||S(T,'a1')>=3)&&Math.max(S(F,'H1'),S(F,'a1'))<=1) W.push(['med','Sédation et/ou <b>hypotension orthostatique</b> (α1) attendues — titration prudente, surtout chez le sujet âgé.']);
  if(T.prolact&&!F.prolact) W.push(['med','Molécule cible volontiers <b>hyperprolactinémiante</b> (galactorrhée, aménorrhée, ↓ libido, risque osseux) — surveiller la prolactinémie.']);
  if(F.prolact&&A(T,'D2')==='pa') W.push(['info','Normalisation attendue de la prolactine (passage à un agoniste partiel D2).']);
  if(fromName==='Clozapine'||toName==='Clozapine') W.push(['high','La <b>clozapine</b> a un profil et une efficacité uniques : son équivalence de dose ne reflète pas son efficacité. Tout changement l\'impliquant doit être encadré spécifiquement (hématologie, titration lente).']);
  const ic={high:'▲',med:'⚠',info:'ℹ',ok:'✓'};
  let warns = W.length ? W.map(w=>'<div class="eqw-item eqw-'+w[0]+'"><span class="ic">'+ic[w[0]]+'</span><span>'+w[1]+'</span></div>').join('')
    : '<div class="eqw-item eqw-ok"><span class="ic">✓</span><span>Profils proches : pas de point de vigilance majeur au-delà de la titration croisée habituelle.</span></div>';
  return '<div class="card eqr-card"><div class="card-head"><h2>Comparaison des profils récepteurs</h2><span class="eyebrow">d\'après Stahl</span></div>'
    +'<div class="card-body">'
    +'<div class="eqr-names"><span>'+esc(fromName)+'</span><span></span><span>'+esc(toName)+'</span></div>'
    +rows
    +'<div class="eqw"><div class="eqw-h">Vigilance au changement</div>'+warns
    +'<p class="hint">Réaliser le changement en <b>titration croisée progressive</b>, en surveillant rechute, effets de rebond et tolérance. Repères de profil indicatifs (action et puissance relative d\'après Stahl).</p></div>'
    +'</div></div>';
}

function renderEQUIV(root, tool){
  const st = STATE['conv-doses'] || (STATE['conv-doses']={fam:'benzo', from:1, to:0, dose:''});
  if(!EQ_FAMILIES[st.fam]) st.fam='benzo';
  const fam = ()=>EQ_FAMILIES[st.fam];
  const frNum = x=>{ let v=Math.round(x*100)/100; return v.toLocaleString('fr-FR',{maximumFractionDigits:2}); };
  function selectHTML(id, sel){
    const F=fam(); let h='<select id="'+id+'">', g=null;
    F.mols.forEach((m,i)=>{
      if(m.g && m.g!==g){ if(g!==null) h+='</optgroup>'; h+='<optgroup label="'+esc(m.g)+'">'; g=m.g; }
      h+='<option value="'+i+'"'+(i===sel?' selected':'')+'>'+esc(m.n)+(m.br?' ('+esc(m.br)+')':'')+(m.soft?' *':'')+'</option>';
    });
    if(g!==null) h+='</optgroup>';
    return h+'</select>';
  }
  function fact(k,v){ return v?'<div class="ei-fact"><span class="k">'+k+'</span><span class="v">'+esc(v)+'</span></div>':''; }
  function taperText(m){
    let t='Réduire d\'environ 10–25 % de la dose toutes les 1–2 semaines, plus lentement en fin de sevrage.';
    if(m.short) t+=' Demi-vie courte : un relais par le diazépam (demi-vie longue) facilite le sevrage (méthode d\'Ashton).';
    return t;
  }
  function infoPanel(){
    const F=fam(); const m=F.mols[st.from]; if(!m) return '';
    if(F.star && m.star){
      return '<div class="eqd-info">'
        +'<div class="eqd-info-head">'+esc(m.n)+(m.br?' · '+esc(m.br):'')+'</div>'
        +'<div class="eqd-info-body">'
          +'<div class="eqd-info-facts">'+fact('Dose usuelle',m.usual)+fact('Dose max',m.max)+fact('Demi-vie',m.half)+'</div>'
          +'<div class="eqd-star">'+eqStarSVG(m.star,F.color)+'<div class="eqd-star-cap">Profil pharmacologique (0–5)<br><span>d\'après l\'étoile d\'Ansseau / RESPADD</span></div></div>'
        +'</div>'
        +'<div class="eqd-taper"><b>Décroissance / arrêt :</b> '+esc(taperText(m))+'</div>'
        +(m.note?'<div class="eqd-part"><b>Particularité :</b> '+esc(m.note)+'</div>':'')
      +'</div>';
    }
    if(m.max){
      return '<div class="eqd-info"><div class="eqd-info-head">'+esc(m.n)+(m.br?' · '+esc(m.br):'')+'</div>'
        +'<div class="eqd-info-mini">'+fact('Dose usuelle max (voie orale)',m.max)+'</div></div>';
    }
    return '';
  }
  function drawScale(){
    const F=fam(); const box=document.getElementById('eqdScale'); if(!box) return;
    const eqs=F.mols.map(m=>m.eq); const lo=Math.min.apply(null,eqs), hi=Math.max.apply(null,eqs);
    const span=(Math.log(hi)-Math.log(lo))||1;
    const arr=F.mols.map((m,i)=>({m,i})).sort((a,b)=>a.m.eq-b.m.eq);
    let h='';
    arr.forEach(({m,i})=>{
      const pct=14+((Math.log(m.eq)-Math.log(lo))/span)*86;
      const cls=i===st.to?'to':(i===st.from?'from':'');
      h+='<div class="eqd-bar-row '+cls+'" data-i="'+i+'"><div class="eqd-bar-lab">'+esc(m.n)+(m.soft?' <span>*</span>':'')+(m.br?' <span>'+esc(m.br)+'</span>':'')+'</div>'
        +'<div class="eqd-bar-track"><div class="eqd-bar-fill" style="width:'+pct.toFixed(1)+'%"></div></div>'
        +'<div class="eqd-bar-val">'+frNum(m.eq)+'</div></div>';
    });
    box.innerHTML=h;
    box.querySelectorAll('[data-i]').forEach(r=>r.onclick=()=>{ st.to=+r.dataset.i; const s=document.getElementById('eqdTo'); if(s) s.value=st.to; update(); });
  }
  function update(){
    const F=fam(); const from=F.mols[st.from], to=F.mols[st.to];
    const dose=parseFloat(String(st.dose).replace(',','.').trim());
    const box=document.getElementById('eqdResult');
    if(box){
      if(!from||!to||!(dose>0)){
        box.className='eqd-result idle'; box.innerHTML='Choisissez les molécules et une dose pour obtenir l\'équivalence.';
      } else {
        const target=dose*(to.eq/from.eq);
        const ref=F.mols[F.refIdx]; const refEquiv=dose*(ref.eq/from.eq);
        const ratio=to.eq/from.eq; let rtxt='';
        if(from!==to){ rtxt = ratio>1 ? ('· '+esc(to.n)+' est ~'+frNum(ratio)+'× moins puissant (plus de mg)') : ('· '+esc(to.n)+' est ~'+frNum(1/ratio)+'× plus puissant (moins de mg)'); }
        const zWarn=((from.g&&from.g!=='Benzodiazépines')||(to.g&&to.g!=='Benzodiazépines'))?'<div class="eqd-ratio" style="color:var(--danger-ink)">⚠ conversion impliquant un apparenté (Z) — particulièrement indicative</div>':'';
        box.className='eqd-result';
        box.innerHTML='<div class="eqd-eq">'
          +'<div class="eqd-tile from"><div class="lab">'+esc(from.n)+'</div><div class="val">'+frNum(dose)+'<span>'+F.unit+'</span></div>'+(from.br?'<div class="br">'+esc(from.br)+'</div>':'')+'</div>'
          +'<div class="eqd-approx">≈</div>'
          +'<div class="eqd-tile to"><div class="lab">'+esc(to.n)+'</div><div class="val"><b>'+frNum(target)+'</b><span>'+F.unit+'</span></div>'+(to.br?'<div class="br">'+esc(to.br)+'</div>':'')+'</div>'
          +'</div>'
          +'<div class="eqd-ref">soit ≈ <b>'+frNum(refEquiv)+' '+F.unit+'</b> de '+esc(ref.n)+' <span class="eqd-ratio">'+rtxt+'</span>'+zWarn+'</div>';
      }
    }
    const info=document.getElementById('eqdInfo'); if(info) info.innerHTML=infoPanel();
    const rec=document.getElementById('eqdRecepWrap');
    if(rec) rec.innerHTML = (st.fam==='ap') ? apReceptorHTML(from&&from.n, to&&to.n) : '';
    drawScale();
  }
  function bindShell(){
    root.querySelectorAll('#eqdFams [data-fam]').forEach(b=>b.onclick=()=>{ st.fam=b.dataset.fam; const nf=fam(); st.from=Math.min(1,nf.mols.length-1); st.to=0; st.dose=''; drawShell(); });
    document.getElementById('eqdFrom').onchange=e=>{ st.from=+e.target.value; update(); };
    document.getElementById('eqdTo').onchange=e=>{ st.to=+e.target.value; update(); };
    document.getElementById('eqdDose').oninput=e=>{ st.dose=e.target.value; update(); };
    document.getElementById('eqdSwap').onclick=()=>{ const a=st.from; st.from=st.to; st.to=a; document.getElementById('eqdFrom').value=st.from; document.getElementById('eqdTo').value=st.to; update(); };
  }
  function drawShell(){
    const F=fam();
    if(st.from>=F.mols.length) st.from=Math.min(1,F.mols.length-1);
    if(st.to>=F.mols.length) st.to=0;
    let h='<div class="eqd" style="--fam:'+F.color+'">';
    h+='<div class="masthead"><div class="kicker">Tables de conversion</div><h1>Équivalences de doses</h1><div class="rule"></div>'
      +'<p class="lead">Convertissez une dose d\'une molécule vers une autre au sein d\'une même famille. Repères approximatifs, calculés localement — la décision et la titration restent médicales.</p></div>';
    h+='<div class="eqd-fams" id="eqdFams">';
    Object.keys(EQ_FAMILIES).forEach(k=>{ const f=EQ_FAMILIES[k];
      h+='<button class="eqd-fam'+(k===st.fam?' on':'')+'" data-fam="'+k+'" style="--fc:'+f.color+'"><span class="fn"><span class="fdot"></span>'+esc(f.label)+'</span><span class="fd">'+esc(f.desc)+'</span></button>';
    });
    h+='</div>';
    h+='<div class="card eqd-conv"><div class="card-head"><h2>Convertir une dose</h2><span class="eyebrow">'+esc(F.desc)+'</span></div><div class="card-body">';
    h+='<div class="eqd-pair">'
      +'<div class="field"><label>Molécule de départ</label>'+selectHTML('eqdFrom',st.from)+'</div>'
      +'<button class="eqd-swap" id="eqdSwap" type="button" title="Inverser départ et cible" aria-label="Inverser">⇄</button>'
      +'<div class="field"><label>Molécule cible</label>'+selectHTML('eqdTo',st.to)+'</div></div>';
    h+='<div class="eqd-dose"><label>Dose de départ</label><div class="eqd-dose-in"><input type="text" id="eqdDose" inputmode="decimal" placeholder="'+F.ph+'" value="'+esc(st.dose)+'"><span class="unit">'+F.unit+'</span></div></div>';
    h+='<div id="eqdResult"></div>';
    h+='<div id="eqdInfo"></div>';
    h+='<div class="note">'+F.note+'</div>';
    h+='</div></div>';
    h+='<div id="eqdRecepWrap"></div>';
    h+='<div class="card"><div class="card-head"><h2>Échelle de puissance</h2><span class="eyebrow">mg pour un effet ≈ '+esc(F.mols[F.refIdx].n)+'</span></div>'
      +'<div class="card-body" style="padding-top:6px"><div class="eqd-scale-help">'+F.scaleHelp+'</div><div class="eqd-scale" id="eqdScale"></div>'
      +'<p class="hint">'+esc(F.scaleNote)+' Cliquez une ligne pour la définir comme molécule cible.</p></div></div>';
    h+='</div>';
    root.innerHTML=h;
    bindShell();
    update();
  }
  drawShell();
}

function initBFCRS(){
  return {
    patient:{nom:"",prenom:"",sexe:"",date:todayISO()},
    tab:"semio",
    signs:{},
    constants:{pa:"",fc:"",fr:"",temp:"",spo2:"",sudation:""},
    obs:"", obsDirty:false,
    scores:new Array(BFCRS.length).fill(null)
  };
}
/* Normalise un état repris (.json) pour éviter les champs manquants */
function normBFCRS(s){
  const d=initBFCRS();
  s.patient=Object.assign(d.patient, s.patient||{});
  s.constants=Object.assign(d.constants, s.constants||{});
  if(!Array.isArray(s.scores)||s.scores.length!==BFCRS.length) s.scores=d.scores;
  if(typeof s.signs!=='object'||!s.signs) s.signs={};
  if(typeof s.obs!=='string') s.obs='';
  s.obsDirty=!!s.obsDirty;
  if(s.tab!=='cotation') s.tab='semio';
  return s;
}




/* ============================================================
   DONNÉES & OUTIL — SCORE DE GLASGOW
   Évaluation de l'état de conscience : ouverture des yeux,
   réponse verbale, réponse motrice. Source : page Cerebrolesion.
   ============================================================ */
const GLASGOW_ITEMS = [
  {key:'yeux', nom:'Ouverture des yeux', opts:[
    ['Absente : aucune ouverture des yeux, même en cas de stimulation douloureuse.',1],
    ['À la douleur : ouverture uniquement lors d’une stimulation douloureuse.',2],
    ['À la demande / stimulation verbale : ouverture quand on le demande.',3],
    ['Spontanée : les yeux sont ouverts.',4]
  ]},
  {key:'verbale', nom:'Réponse verbale', opts:[
    ['Absente : ne parle pas, aucun son ne sort de la bouche.',1],
    ['Incompréhensible : sons, grognements, parole non distincte.',2],
    ['Inappropriée : mots compréhensibles mais réponses inadaptées, conversation impossible.',3],
    ['Confuse : parle mais avec erreurs ou répétitions.',4],
    ['Orientée / normale : répond correctement à des questions simples.',5]
  ]},
  {key:'motrice', nom:'Réponse motrice', opts:[
    ['Absente : pas de réaction à la stimulation douloureuse.',1],
    ['Extension réflexe (décérébration).',2],
    ['Flexion réflexe (décortication).',3],
    ['Réaction non orientée à la douleur (non adaptée).',4],
    ['Réaction orientée à la douleur (adaptée).',5],
    ['Obéissance aux ordres verbaux.',6]
  ]}
];
const GLASGOW_RULES = [
  'Le score de Glasgow évalue l’état de conscience selon 3 critères : ouverture des yeux, réponse verbale et réponse motrice.',
  'Le total est compris entre 3 et 15 : 3 correspond au coma profond, 15 à un état de conscience normale.',
  'Si la personne n’exécute pas d’action spontanée, ni au bruit ni au toucher, on teste sa réaction à la douleur.',
  'La stimulation douloureuse doit rester un geste technique n’entraînant ni blessure, ni aggravation de l’état, ni lésion de la zone stimulée.',
  'Le score aide à apprécier la gravité et à adapter la prise en charge ; il ne remplace pas l’évaluation clinique globale.'
];
function initGLASGOW(){
  return { patient:{nom:'',prenom:'',sexe:'',date:todayISO()}, scores:[4,5,6] };
}
function normGLASGOW(s){
  const d=initGLASGOW();
  s.patient=Object.assign(d.patient, s.patient||{});
  if(!Array.isArray(s.scores)||s.scores.length!==GLASGOW_ITEMS.length) s.scores=d.scores;
  s.scores=s.scores.map((v,i)=> (v===null||typeof v==='undefined'||isNaN(+v)) ? d.scores[i] : +v);
  return s;
}
function glasgowTotal(st){ return st.scores.reduce((a,b)=>a+(+b||0),0); }
function glasgowInterp(total){
  if(total===15) return {range:'15', title:'Conscience normale', conduite:'Surveillance clinique adaptée au contexte et réévaluation si modification de l’état neurologique.'};
  if(total>=10) return {range:'14–10', title:'Somnolence ou coma léger', conduite:'Surveillance rapprochée, réévaluation régulière du score et recherche/prise en charge de la cause. Avis médical urgent selon le contexte.'};
  if(total>=7) return {range:'9–7', title:'Coma lourd', conduite:'Urgence clinique : surveillance continue des constantes et de l’état neurologique, protection des voies aériennes selon contexte, avis urgent SAMU/réanimation.'};
  return {range:'6–3', title:'Coma profond', conduite:'Urgence vitale : appel médical immédiat / SAMU-réanimation, protection des voies aériennes, monitorage, recherche d’une cause réversible selon contexte.'};
}
function renderGLASGOW(root, tool){
  const st = STATE.glasgow ? normGLASGOW(STATE.glasgow) : (STATE.glasgow = initGLASGOW());
  root.innerHTML = mastheadHTML() + identityHTML() + scoreHTML();
  wireIdentity(); wireScore(); updateScore();

  function mastheadHTML(){
    return '<div class="masthead"><div class="kicker">Échelles & scores</div><h1>Score de Glasgow</h1>'
      +'<div class="subtitle">Évaluation de l’état de conscience — ouverture des yeux, réponse verbale, réponse motrice</div><div class="rule"></div></div>';
  }
  function identityHTML(){
    const p=st.patient, H=session.patient;
    const ph=(v,lbl)=> v ? (esc(v)+' (accueil)') : lbl;
    const sxHint = (!p.sexe && H.sexe) ? ' · accueil : '+(H.sexe==='F'?'Femme':'Homme') : '';
    return '<div class="card"><h2>Patient</h2>'
      +'<p class="muted" style="margin-bottom:10px">Par défaut, l’identité de l’accueil est utilisée. Renseignez un champ ici pour la remplacer dans cet outil.</p>'
      +'<div class="idrow">'
      +'<div class="field"><label>Nom</label><input type="text" id="gcsNom" autocomplete="off" value="'+esc(p.nom)+'" placeholder="'+ph(H.nom,'Nom')+'"></div>'
      +'<div class="field"><label>Prénom</label><input type="text" id="gcsPrenom" autocomplete="off" value="'+esc(p.prenom)+'" placeholder="'+ph(H.prenom,'Prénom')+'"></div>'
      +'<div class="sexe"><span class="lab">Sexe'+sxHint+'</span><span class="chips">'
      +'<button data-gsexe="H"'+(p.sexe==='H'?' class="on"':'')+'>Homme</button>'
      +'<button data-gsexe="F"'+(p.sexe==='F'?' class="on"':'')+'>Femme</button></span></div></div>'
      +'<div class="grid2" style="margin-top:12px"><div class="field"><label>Date d’examen</label><input type="date" id="gcsDate" value="'+esc(p.date)+'"></div><div></div></div></div>';
  }
  function scoreHTML(){
    let h='<div class="scale-name">Score de Glasgow<span class="sn-tag">GCS 3–15</span></div>';
    h+='<div class="consigne">Sélectionnez la meilleure réponse observée pour chaque critère. Le score total, l’interprétation et la conduite à tenir se mettent à jour automatiquement.</div>';
    h+='<details class="proto"><summary>'+ICONS.list+' Règles<span class="caret">▾</span></summary><div class="pbody"><ol>'
      +GLASGOW_RULES.map(r=>'<li>'+esc(r)+'</li>').join('')+'</ol></div></details>';
    h+='<div class="score-sticky"><span class="stot"><span id="gcsTot">15</span> <small>/ 15</small></span><span class="schip">Interprétation : <span id="gcsRange">15</span></span><span class="bar"><span class="f" id="gcsBar"></span></span><button class="btn pbtn" id="gcsPrint">'+ICONS.print+' PDF</button></div>';
    h+='<div class="card"><h2>Cotation</h2><div class="cush-grid">';
    GLASGOW_ITEMS.forEach((it,i)=>{
      h+='<div class="cush-row" data-gi="'+i+'"><div class="chead"><span class="cnum">'+(i+1)+'</span><span class="cnom">'+esc(it.nom)+'</span></div><div class="cush-opts">';
      it.opts.forEach(([lab,score])=>{
        h+='<button type="button" class="cush-opt'+(st.scores[i]===score?' on':'')+'" data-gi="'+i+'" data-gs="'+score+'"><span class="pt">'+score+'</span><span class="ol">'+esc(lab)+'</span></button>';
      });
      h+='</div></div>';
    });
    h+='</div></div>';
    h+='<div class="card score-card cush-interpret"><h2>Résultat</h2><div class="big"><span id="gcsTot2">15</span> <small>/ 15</small></div><div class="cat" id="gcsCat"></div><h3>Conduite à tenir</h3><p id="gcsCAT" style="margin:0;color:var(--ink);line-height:1.55"></p><div class="actions"><button class="btn danger" id="gcsReset">Réinitialiser</button><span class="spacer"></span><button class="btn" id="gcsPrint2">'+ICONS.print+' Imprimer / PDF</button></div></div>';
    return h;
  }
  function wireIdentity(){
    const bind=(id,key)=>{ const e=document.getElementById(id); if(e) e.addEventListener('input',ev=>{ st.patient[key]=ev.target.value; }); };
    bind('gcsNom','nom'); bind('gcsPrenom','prenom'); bind('gcsDate','date');
    root.querySelectorAll('button[data-gsexe]').forEach(b=>b.onclick=()=>{
      const v=b.dataset.gsexe; st.patient.sexe=(st.patient.sexe===v)?'':v;
      root.querySelectorAll('button[data-gsexe]').forEach(x=>x.classList.toggle('on',x.dataset.gsexe===st.patient.sexe));
    });
  }
  function wireScore(){
    root.querySelectorAll('.cush-opt[data-gi]').forEach(b=>b.onclick=()=>{
      const i=+b.dataset.gi, sc=+b.dataset.gs; st.scores[i]=sc;
      root.querySelectorAll('.cush-opt[data-gi="'+i+'"]').forEach(x=>x.classList.toggle('on',+x.dataset.gs===sc));
      updateScore();
    });
    document.getElementById('gcsPrint').onclick=printGlasgow;
    document.getElementById('gcsPrint2').onclick=printGlasgow;
    document.getElementById('gcsReset').onclick=()=>{
      showModal('<h2>Réinitialiser le score ?</h2><p>Efface la cotation et l’identité saisie dans cet outil.</p><div class="mf"><button class="btn ghost" id="rno">Annuler</button><button class="btn" id="ryes" style="background:#dc2626;border-color:#dc2626;color:#fff">Effacer</button></div>');
      document.getElementById('rno').onclick=closeModal;
      document.getElementById('ryes').onclick=()=>{ closeModal(); STATE.glasgow=initGLASGOW(); render(); toast('Score réinitialisé.'); };
    };
  }
  function updateScore(){
    const total=glasgowTotal(st), interp=glasgowInterp(total);
    const set=(id,v)=>{ const e=document.getElementById(id); if(e) e.textContent=v; };
    set('gcsTot',total); set('gcsTot2',total); set('gcsRange',interp.range); set('gcsCat',interp.range+' · '+interp.title); set('gcsCAT',interp.conduite);
    const bar=document.getElementById('gcsBar'); if(bar) bar.style.width=((total-3)/12*100)+'%';
  }
  function pdfName(){
    const p=effPatient(st.patient);
    let nm=((p.nom||'')+'_'+(p.prenom||'')).normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^A-Za-z0-9_\-]/g,'').replace(/_+/g,'_').replace(/^_|_$/g,'');
    if(!nm) nm='patient';
    return 'ScoreGlasgow_'+nm+'_'+stampNow();
  }
  function printHTML(){
    const p=effPatient(st.patient);
    const who=((p.nom||'').toUpperCase()+' '+(p.prenom||'')).trim()||'—';
    const sx=p.sexe==='H'?'Homme':(p.sexe==='F'?'Femme':'—');
    const total=glasgowTotal(st), interp=glasgowInterp(total);
    const rows=GLASGOW_ITEMS.map((it,i)=>{
      const s=st.scores[i], opt=it.opts.find(o=>o[1]===s);
      return '<div class="bfp-item"><span class="bfp-n">'+(i+1)+'.</span><span class="bfp-nom">'+esc(it.nom)+'</span><span class="bfp-sc s'+Math.min(3,Math.max(0,s-1))+'">'+s+'</span><span class="bfp-lab">'+esc(opt?opt[0]:'')+'</span></div>';
    }).join('');
    return '<div class="bfp">'
      +'<div class="bfp-head"><div class="bfp-title">Score de Glasgow<span class="sn-tag">GCS</span></div>'
      +'<div class="bfp-meta">Patient : '+esc(who)+' &nbsp;·&nbsp; Sexe : '+sx+' &nbsp;·&nbsp; Examen le '+frDate(st.patient.date)+' à '+timeNow()+'</div></div>'
      +'<div class="bfp-consigne">État de conscience évalué sur 3 critères : ouverture des yeux, réponse verbale et réponse motrice. Score total 3–15.</div>'
      +'<div class="bfp-grid">'+rows+'</div>'
      +'<div class="bfp-total"><span class="tt">Total</span><span class="tv">'+total+' <small>/ 15</small></span><span class="tt tright">'+esc(interp.range+' · '+interp.title)+'</span></div>'
      +'<div class="bfp-note"><b>Conduite à tenir :</b> '+esc(interp.conduite)+'</div>'
      +'<div class="bfp-src">Échelle de Glasgow — ouverture des yeux, réponse verbale, réponse motrice · source : Cerebrolesion / Parvis.</div></div>';
  }
  function printGlasgow(){
    const holder=document.createElement('div'); holder.id='bfPrintHolder'; holder.innerHTML=printHTML();
    document.body.appendChild(holder);
    const prev=document.title; document.title=pdfName();
    document.body.classList.add('printing-bf');
    window.print();
    setTimeout(()=>{ document.title=prev; document.body.classList.remove('printing-bf'); holder.remove(); },700);
  }
}

const CUSHMAN_ITEMS = [

  function wireIdentity(){
    const bind=(id,key)=>{ const e=document.getElementById(id); if(e) e.addEventListener('input',ev=>{ st.patient[key]=ev.target.value; }); };

  function wireScore(){
    root.querySelectorAll('.cush-opt').forEach(b=>b.onclick=()=>{

  function updateScore(){
    const total=cushmanTotal(st), interp=cushmanInterp(total);
    const set=(id,v)=>{ const e=document.getElementById(id); if(e) e.textContent=v; };
    set('cushTot',total); set('cushTot2',total); set('cushRange',interp.range); set('cushCat',interp.range+' · '+interp.title); set('cushCAT',interp.conduite);
    const bar=document.getElementById('cushBar'); if(bar) bar.style.width=(total/21*100)+'%';

      const notes=[];
      if(st.alerts.hyperthermie||st.alerts.beta) notes.push('Score non utilisable en cas d’hyperthermie > 38 °C ou de traitement par bêtabloquants : réévaluation clinique nécessaire.');

      if(st.alerts.conv) notes.push('Antécédent de crise convulsive généralisée : Valium® 10 mg toutes les 4 heures d’emblée, voire plus selon le score, mais pas moins.');

  function pdfName(){
    const p=effPatient(st.patient);
    let nm=((p.nom||'')+'_'+(p.prenom||'')).normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^A-Za-z0-9_\-]/g,'').replace(/_+/g,'_').replace(/^_|_$/g,'');
    if(!nm) nm='patient';
    return 'ScoreCushman_'+nm+'_'+stampNow();

  function printHTML(){
    const p=effPatient(st.patient);
    const who=((p.nom||'').toUpperCase()+' '+(p.prenom||'')).trim()||'—';
    const sx=p.sexe==='H'?'Homme':(p.sexe==='F'?'Femme':'—');

    }).join('');

    if(st.alerts.hyperthermie||st.alerts.beta) notes.push('Score non utilisable si hyperthermie > 38 °C ou bêtabloquants.');
    if(st.alerts.resp) notes.push('Limitation du Valium® en cas d’insuffisance respiratoire / BPCO / pneumopathie / fracture de côtes.');
    if(st.alerts.conv) notes.push('ATCD crise convulsive généralisée : Valium® 10 mg toutes les 4 heures d’emblée, voire plus selon le score, mais pas moins.');
    return '<div class="bfp">'
      +'<div class="bfp-head"><div class="bfp-title">Score de Cushman<span class="sn-tag">Sevrage alcoolique</span></div>'
      +'<div class="bfp-meta">Patient : '+esc(who)+' &nbsp;·&nbsp; Sexe : '+sx+' &nbsp;·&nbsp; Examen le '+frDate(st.patient.date)+' à '+timeNow()+'</div></div>'
      +'<div class="bfp-consigne">Score de surveillance du sevrage alcoolique. Réévaluation toutes les 6 h selon la situation clinique.</div>'
      +'<div class="bfp-grid">'+rows+'</div>'
      +'<div class="bfp-total"><span class="tt">Total</span><span class="tv">'+total+' <small>/ 21</small></span><span class="tt tright">'+esc(interp.range+' · '+interp.title)+'</span></div>'
      +'<div class="bfp-note"><b>Conduite à tenir :</b> '+esc(interp.conduite)+'</div>'
      +(notes.length?'<div class="bfp-note"><b>Points de vigilance :</b><br>'+notes.map(esc).join('<br>')+'</div>':'')
      +'<div class="bfp-src">Score de Cushman — surveillance du sevrage alcoolique · Cushmann PJ et al., Alcohol Abuse 1985.</div></div>';
  }
  function printCushman(){
    const holder=document.createElement('div'); holder.id='bfPrintHolder'; holder.innerHTML=printHTML();
    document.body.appendChild(holder);
    const prev=document.title; document.title=pdfName();
    document.body.classList.add('printing-bf');
    window.print();
    setTimeout(()=>{ document.title=prev; document.body.classList.remove('printing-bf'); holder.remove(); },700);
  }
}

/* ============================================================

function renderBFCRS(root, tool){
  const st = STATE.bfcrs ? normBFCRS(STATE.bfcrs) : (STATE.bfcrs = initBFCRS());

  root.innerHTML = mastheadHTML() + identityHTML() + tabsHTML() + '<div id="bfBody"></div>';
  wireIdentity();
  root.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{
    st.tab=b.dataset.t;
    root.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x.dataset.t===st.tab));
    drawBody();
  });
  drawBody();

  /* ---------- shell ---------- */
  function mastheadHTML(){
    return '<div class="masthead"><div class="kicker">Échelles & scores</div><h1>Bush-Francis</h1>'
      +'<div class="subtitle">Évaluation de la catatonie — sémiologie & échelle de cotation</div><div class="rule"></div></div>';
  }
  function identityHTML(){
    const p=st.patient, H=session.patient;
    const ph=(v,lbl)=> v ? (esc(v)+' (accueil)') : lbl;
    const sxHint = (!p.sexe && H.sexe) ? ' · accueil : '+(H.sexe==='F'?'Femme':'Homme') : '';
    return '<div class="card"><h2>Patient</h2>'
      +'<p class="muted" style="margin-bottom:10px">Par défaut, l\'identité de l\'accueil est utilisée. Renseignez un champ ici pour la remplacer dans cet outil.</p>'
      +'<div class="idrow">'
      +'<div class="field"><label>Nom</label><input type="text" id="idNom" autocomplete="off" value="'+esc(p.nom)+'" placeholder="'+ph(H.nom,'Nom')+'"></div>'
      +'<div class="field"><label>Prénom</label><input type="text" id="idPrenom" autocomplete="off" value="'+esc(p.prenom)+'" placeholder="'+ph(H.prenom,'Prénom')+'"></div>'
      +'<div class="sexe"><span class="lab">Sexe'+sxHint+'</span><span class="chips">'
      +'<button data-sexe="H"'+(p.sexe==='H'?' class="on"':'')+'>Homme</button>'
      +'<button data-sexe="F"'+(p.sexe==='F'?' class="on"':'')+'>Femme</button></span></div></div>'
      +'<div class="grid2" style="margin-top:12px"><div class="field"><label>Date d\'examen</label><input type="date" id="idDate" value="'+esc(p.date)+'"></div><div></div></div></div>';
  }
  function tabsHTML(){
    return '<div class="tabs">'
      +'<button class="tab'+(st.tab==='semio'?' on':'')+'" data-t="semio">Évaluation sémiologique</button>'
      +'<button class="tab'+(st.tab==='cotation'?' on':'')+'" data-t="cotation">Échelle de cotation</button></div>';
  }
  function wireIdentity(){
    const bind=(id,key)=>{ const e=document.getElementById(id); if(e) e.addEventListener('input',ev=>{ st.patient[key]=ev.target.value; }); };
    bind('idNom','nom'); bind('idPrenom','prenom'); bind('idDate','date');
    root.querySelectorAll('button[data-sexe]').forEach(b=>b.onclick=()=>{
      const v=b.dataset.sexe; st.patient.sexe=(st.patient.sexe===v)?'':v;
      root.querySelectorAll('button[data-sexe]').forEach(x=>x.classList.toggle('on',x.dataset.sexe===st.patient.sexe));
      refreshObs();
    });
  }
  function drawBody(){
    const body=root.querySelector('#bfBody');
    if(st.tab==='semio'){ body.innerHTML=semioHTML(); wireSemio(); }
    else { body.innerHTML=cotationHTML(); wireCotation(); }
  }
  function resetAll(){
    showModal('<h2>Tout réinitialiser ?</h2><p>Efface l\'identité du patient, les signes, les constantes, l\'observation et la cotation. Action irréversible.</p><div class="mf"><button class="btn ghost" id="rno">Annuler</button><button class="btn" id="ryes" style="background:#dc2626;border-color:#dc2626;color:#fff">Tout effacer</button></div>');
    document.getElementById('rno').onclick=closeModal;
    document.getElementById('ryes').onclick=()=>{ closeModal(); const tab=st.tab; STATE.bfcrs=initBFCRS(); STATE.bfcrs.tab=tab; render(); toast('Saisies réinitialisées.'); };
  }

  /* ---------- onglet SÉMIOLOGIE ---------- */
  function semioHTML(){
    let h='<div class="consigne">Cochez les signes présents à l\'examen. Le décompte et l\'observation se mettent à jour en bas, en direct.</div>';
    h+='<div class="card"><h2>Signes</h2><div class="sign-list">';
    SEMIO_SIGNS.forEach(s=>{
      h+='<button class="sign'+(st.signs[s.key]?' on':'')+'" data-k="'+s.key+'"><span class="box"></span>'
        +'<span><span class="nm">'+esc(s.nom)+'</span>'+(s.desc?'<span class="ds">'+esc(s.desc)+'</span>':'')+'</span></button>';
    });

    h+='<div class="card"><h2>Nombre de signes retrouvés</h2>'
      +'<div class="count-row"><span class="count-big"><span id="bfN">0</span> <small>/ 12</small></span>'
      +'<span class="flag off" id="bfFlag">Aucun signe retrouvé</span></div>'
      +'<div class="rule-hint">Repère : <b>à partir de 3 signes → syndrome catatonique</b>. Le cas échéant : relever les constantes puis compléter l\'échelle de cotation de Bush-Francis.</div></div>';
    h+='<div class="card"><h2>Constantes</h2><div class="const-grid">';
    CONST_FIELDS.forEach(f=>{
      h+='<div class="field"><label>'+esc(f.lab)+'</label><input type="text" data-c="'+f.key+'" value="'+esc(st.constants[f.key]||'')+'" placeholder="'+esc(f.ph)+'"></div>';
    });
    h+='</div><div class="sud-wrap" style="margin-top:12px"><span class="lab">Hypersudation</span><span class="chips">'
      +'<button data-sud="oui"'+(st.constants.sudation==='oui'?' class="on"':'')+'>Oui</button>'
      +'<button data-sud="non"'+(st.constants.sudation==='non'?' class="on"':'')+'>Non</button></span></div></div>';
    h+='<div class="card obs-box"><h2>Observation clinique</h2>'
      +'<p class="muted" style="margin-bottom:8px">Générée à partir des signes cochés et des constantes. Modifiable librement ; « Régénérer » reconstruit le texte depuis les cases.</p>'
      +'<textarea id="bfObs"></textarea>'
      +'<div class="obs-actions"><button class="btn" id="bfCopy">'+ICONS.copy+' Copier</button>'
      +'<button class="btn ghost" id="bfRegen">'+ICONS.refresh+' Régénérer</button>'
      +'<span class="copied" id="bfCopied" style="display:none">Copié ✓</span></div></div>';
    h+='<div class="actions"><button class="btn danger" id="bfResetS">Réinitialiser</button></div>';
    return h;
  }
  function wireSemio(){
    root.querySelectorAll('.sign').forEach(b=>b.onclick=()=>{
      const k=b.dataset.k; st.signs[k]=!st.signs[k];
      b.classList.toggle('on',st.signs[k]); updateCount(); refreshObs();
    });
    root.querySelectorAll('input[data-c]').forEach(inp=>inp.addEventListener('input',e=>{ st.constants[e.target.dataset.c]=e.target.value; refreshObs(); }));
    root.querySelectorAll('button[data-sud]').forEach(b=>b.onclick=()=>{
      const v=b.dataset.sud; st.constants.sudation=(st.constants.sudation===v)?'':v;
      root.querySelectorAll('button[data-sud]').forEach(x=>x.classList.toggle('on',x.dataset.sud===st.constants.sudation));
      refreshObs();
    });
    const ta=document.getElementById('bfObs');
    ta.value = st.obsDirty ? st.obs : genObs();
    ta.addEventListener('input',e=>{ st.obs=e.target.value; st.obsDirty=true; });
    document.getElementById('bfRegen').onclick=()=>{ st.obsDirty=false; st.obs=genObs(); ta.value=st.obs; };
    document.getElementById('bfCopy').onclick=()=>copyText(ta.value,()=>{
      const c=document.getElementById('bfCopied'); if(c){ c.style.display='inline'; clearTimeout(wireSemio._t); wireSemio._t=setTimeout(()=>c.style.display='none',1800); }
    });
    document.getElementById('bfResetS').onclick=resetAll;
    updateCount();
  }
  function updateCount(){
    const n=SEMIO_SIGNS.filter(s=>st.signs[s.key]).length;
    const e=document.getElementById('bfN'); if(e) e.textContent=n;
    const f=document.getElementById('bfFlag'); if(f){
      if(n>=CATA_SEUIL){ f.className='flag on'; f.textContent='Syndrome catatonique (≥ 3 signes)'; }
      else { f.className='flag off'; f.textContent = n===0 ? 'Aucun signe retrouvé' : 'Sous le seuil (< 3 signes)'; }
    }
  }
  function refreshObs(){ const ta=document.getElementById('bfObs'); if(ta && !st.obsDirty){ st.obs=genObs(); ta.value=st.obs; } }
  function genObs(){
    const eff=effPatient(st.patient);
    const suj = eff.sexe==='F' ? 'cette patiente' : (eff.sexe==='H' ? 'ce patient' : 'ce·tte patient·e');
    const checked = SEMIO_SIGNS.filter(s=>st.signs[s.key]);
    let txt;
    if(!checked.length){
      txt = "À l'examen sémiologique, on ne retrouve pas de signe de la lignée catatonique chez "+suj+".";
    } else {
      txt = "On retrouve chez "+suj+" : "+joinFr(checked.map(s=>s.narr))+". Soit "+checked.length+" signe"+(checked.length>1?'s':'')+" de la lignée catatonique.";
      if(checked.length>=CATA_SEUIL) txt += " Ce tableau est en faveur d'un syndrome catatonique (au moins 3 signes).";
    }
    const cf=[];
    CONST_FIELDS.forEach(f=>{ const v=(st.constants[f.key]||'').trim(); if(v) cf.push(f.narr+v); });
    if(st.constants.sudation==='oui') cf.push('hypersudation présente');
    else if(st.constants.sudation==='non') cf.push("absence d'hypersudation");
    if(cf.length) txt += "\n\nSur le plan des constantes : "+joinFr(cf)+".";
    return txt;
  }

  function wireCotation(){

  function updateScore(){
    let tot=0,coted=0,pos=0;

      +'<div class="bfp-note">Dépistage BFCSI : les 14 premiers items ; la présence d\'au moins 2 de ces items oriente vers une catatonie. Aide à la cotation — ne pose pas de diagnostic.</div>'
      +'<div class="bfp-src">Bush-Francis Catatonia Rating Scale (Bush et al., 1996) · document AESP.</div></div>';
  }
  function printBFCRS(){

    document.body.classList.add('printing-bf');
    window.print();
    setTimeout(()=>{ document.title=prev; document.body.classList.remove('printing-bf'); holder.remove(); },700);
  }

function normCERFA(s){ const d=initCERFA(); Object.keys(d).forEach(k=>{ if(typeof s[k]==='undefined') s[k]=d[k]; }); return s; }
function frDateOrRaw(v){ if(!v) return ''; const m=/^(\d{4})-(\d{2})-(\d{2})$/.exec(v); return m?(m[3]+'/'+m[2]+'/'+m[1]):v; }
/* normalisation robuste (accents/casse/octets) pour apparier les options radio */
function cerfaNorm(s){ return (''+s).replace(/^\//,'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9 ]+/g,' ').replace(/\s+/g,' ').trim(); }
/* Certains « radios » du cerfa n'ont pas le drapeau Radio : pdf-lib les voit comme
   des cases à cocher et getCheckBox().check() coche toujours le 1er widget.
   On sélectionne donc le bon widget en bas niveau (état /AP/N ↔ valeur voulue). */
function cerfaOnKey(w, PDFName){
  try{ const ap=w.dict.lookup(PDFName.of('AP')); const n=ap.lookup(PDFName.of('N'));
       for(const k of n.keys()){ if(k.asString()!=='/Off') return k; } }catch(e){}
  return null;
}
/* Les libellés internes des cases du PDF contiennent parfois des échappements PDFName
   (#20 pour espace, #8E/#88 pour certains accents selon l'encodage du CERFA).
   On les décode avant comparaison, sinon des groupes comme Origine / Date d'apparition
   ne se cochent pas toujours dans le PDF généré. */
function cerfaKeyNorm(k){
  let s=(k&&typeof k.asString==='function') ? k.asString() : (''+k);
  s=s.replace(/^\//,'').replace(/#([0-9A-Fa-f]{2})/g,(m,h)=>{
    const c=parseInt(h,16);
    if(c===0x20) return ' ';
    if(c===0x88) return 'a';      // à dans ce CERFA
    if(c===0x8E) return 'e';      // é/è dans ce CERFA
    if(c>=32 && c<=126) return String.fromCharCode(c);
    return ' ';
  });
  return cerfaNorm(s);
}
/* Taille de police : plafond (= champ « Nom de naissance » du cerfa, TiRo 9),
   sans agrandir le texte court ; on réduit si le texte déborde en largeur
   (mono-ligne) ou s'il ne tient pas en hauteur une fois passé à la ligne (multiligne). */
function cerfaFitSize(font, text, boxW, boxH, multiline, maxSize){
  text=''+text;
  const padX=4, padY=3;
  const availW=Math.max(1, boxW-2*padX);
  const availH=Math.max(1, boxH-2*padY);
  const cap=Math.min(maxSize, availH*0.9);
  const measure=(t,s)=>{ try{ return font.widthOfTextAtSize(t,s); }catch(e){ return t.length*s*0.5; } };
  if(!multiline){
    let s=cap; const w=measure(text,s);
    if(w>availW) s=Math.max(4, s*availW/w);
    return s;
  }
  const paras=text.split(/\r?\n/);
  for(let s=cap; s>=4; s-=0.5){
    const lineH=s*1.18; let lines=0;
    for(const p of paras){
      const words=p.split(/\s+/).filter(Boolean);
      if(!words.length){ lines++; continue; }
      let cur='';
      for(const wd of words){
        const test=cur?cur+' '+wd:wd;
        if(measure(test,s)>availW){ lines++; cur=wd; } else cur=test;
      }
      if(cur) lines++;
    }
    if(lines*lineH<=availH) return s;
  }
  return 4;
}
function cerfaSelectOption(form, fid, val, PDFName, pickLast){
  let field; try{ field=form.getField(fid); }catch(e){ return false; }
  if(!field||!field.acroField) return false;
  const acro=field.acroField; let widgets;
  try{ widgets=acro.getWidgets(); }catch(e){ return false; }
  const want=cerfaNorm(val);
  const infos=widgets.map(w=>({w, onKey:cerfaOnKey(w,PDFName)}));
  const exact=infos.filter(x=>x.onKey && cerfaKeyNorm(x.onKey)===want);
  const inc=infos.filter(x=>x.onKey && cerfaKeyNorm(x.onKey).indexOf(want)>=0);
  let cands=exact.length?exact:inc;
  let chosen = cands.length ? (pickLast?cands[cands.length-1]:cands[0]) : null;
  if(!chosen){ const ons=infos.filter(x=>x.onKey); if(ons.length===1 && val) chosen=ons[0]; }
  if(!chosen) return false;
  infos.forEach(({w,onKey})=>{
    const isChosen=(w===chosen.w && onKey);
    const state=isChosen?onKey:PDFName.of('Off');
    w.dict.set(PDFName.of('AS'), state);
    /* Certains widgets du CERFA portent aussi un /V local : on le synchronise
       pour éviter les cases qui restent visuellement décochées selon les lecteurs PDF. */
    w.dict.set(PDFName.of('V'), state);
  });
  acro.dict.set(PDFName.of('V'), chosen.onKey);
  return true;
}

/* Sélection visuelle indépendante pour les groupes AcroForm partagés par les pages 5 et 7.
   Le CERFA officiel regroupe techniquement plusieurs questions différentes dans un même champ.
   Au lieu d'écrire une seule valeur de champ (qui écraserait une page par l'autre), on positionne
   directement l'état d'apparence de chaque widget concerné. Cela permet de cocher simultanément
   la réponse page 5 et la réponse page 7, y compris NSP, sans logique de priorité. */
function cerfaOptionNeedle(map, key){ const o=map.find(x=>x.k===key); return o?o.m:''; }
function cerfaApplySharedWidgets(form, PDFName){
  const st=STATE['cerfa-mdph']; if(!st) return;
  const groups=[
    {fid:'Case à cocher Option P5 8', vals:[cerfaOptionNeedle(CERFA_ABCD,st.gPrehNon), cerfaOptionNeedle(CERFA_SITFAM,st.situFam)]},
    {fid:'Case à cocher Option P5 9', vals:[cerfaOptionNeedle(CERFA_ABCD,st.gMotFine), cerfaOptionNeedle(CERFA_OUINON,st.presenceAidant)]},
    {fid:'Case à cocher Option P5 10', vals:[cerfaOptionNeedle(CERFA_ABCD,st.gCommuniquer), cerfaOptionNeedle(CERFA_OUINONNSP,st.emploiTravaille)]},
    {fid:'Case à cocher Option P5 11', vals:[cerfaOptionNeedle(CERFA_ABCD,st.gTelephone), cerfaOptionNeedle(CERFA_OUINONNSP,st.emploiRecherche)]}
  ];
  groups.forEach(g=>{
    let field; try{ field=form.getField(g.fid); }catch(e){ return; }
    if(!field||!field.acroField) return;
    const acro=field.acroField; let widgets=[];
    try{ widgets=acro.getWidgets(); }catch(e){ return; }
    const infos=widgets.map(w=>({w,onKey:cerfaOnKey(w,PDFName)}));
    infos.forEach(({w})=>{ w.dict.set(PDFName.of('AS'), PDFName.of('Off')); w.dict.set(PDFName.of('V'), PDFName.of('Off')); });
    const chosen=[];
    g.vals.filter(Boolean).forEach(val=>{
      const want=cerfaNorm(val);
      const cand=infos.find(x=>x.onKey && cerfaKeyNorm(x.onKey)===want)
              || infos.find(x=>x.onKey && cerfaKeyNorm(x.onKey).indexOf(want)>=0);
      if(cand){ cand.w.dict.set(PDFName.of('AS'), cand.onKey); cand.w.dict.set(PDFName.of('V'), cand.onKey); chosen.push(cand.onKey); }
    });
    /* Valeur administrative du champ : on en garde une si nécessaire, mais l'affichage fiable
       repose sur /AS de chaque widget. Ne pas appeler updateFieldAppearances() globalement. */
    if(chosen.length) acro.dict.set(PDFName.of('V'), chosen[chosen.length-1]);
    else { try{ acro.dict.delete(PDFName.of('V')); }catch(e){} }
  });
}

function cerfaDrawSSDigits(doc, form, font){
  const st=STATE['cerfa-mdph']||{};
  const ss=(st.ss||'').replace(/\D/g,'').slice(0,15);
  if(!ss || !font) return;
  const page=doc.getPages()[0];
  const size=11;
  for(let i=0;i<15;i++){
    const d=ss[i]; if(!d) continue;
    const fid='N° immatriculation SS '+(i+1);
    try{
      const tf=form.getTextField(fid);
      /* On laisse le champ PDF vide et on dessine le chiffre nous-mêmes :
         les champs du CERFA sont minuscules et leur apparence auto est peu lisible. */
      try{ tf.setText(''); }catch(e){}
      const widgets=tf.acroField.getWidgets();
      if(!widgets||!widgets.length) continue;
      const r=widgets[0].getRectangle();
      const tw=font.widthOfTextAtSize(d,size);
      page.drawText(d,{x:r.x+(r.width-tw)/2,y:r.y+(r.height-size)/2+1.2,size,font});
    }catch(e){}
  }
}

function cerfaPdfName(){
  const st=STATE['cerfa-mdph']||{}; const eff=cerfaEff(st);
  let nm=((eff.nom||'')+'_'+(eff.prenom||'')).normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^A-Za-z0-9_\-]/g,'').replace(/_+/g,'_').replace(/^_|_$/g,'');
  if(!nm) nm='patient';
  return 'Certif_MDPH_'+nm+'_'+todayISO()+'.pdf';
}
async function genCerfaPDF(){
  const btn=document.getElementById('cGen'); const prev=btn?btn.innerHTML:'';
  if(btn){ btn.disabled=true; btn.textContent='Génération…'; }
  try{
    const PDFLib=await ensurePDFLib();
    const resp=await fetch(CERFA_PDF_URL);
    if(!resp.ok) throw new Error('cerfa introuvable (HTTP '+resp.status+')');
    const bytes=await resp.arrayBuffer();
    const { PDFDocument, StandardFonts, PDFName }=PDFLib;
    const doc=await PDFDocument.load(bytes);
    const form=doc.getForm();
    let helv=null; try{ helv=await doc.embedFont(StandardFonts.TimesRoman); }catch(e){}
    const V=cerfaValues();
    Object.keys(V).forEach(fid=>{
      const val=V[fid];
      try{ const tf=form.getTextField(fid); tf.setText(val);
           const ml=CERFA_MULTILINE.has(fid);
           if(ml){ try{ tf.enableMultiline(); }catch(e){} }
           let sz=9;
           try{ const ws=tf.acroField.getWidgets(); const rc=(ws&&ws[0])?ws[0].getRectangle():null;
                if(rc&&helv) sz=cerfaFitSize(helv, val, rc.width, rc.height, ml, 9); }catch(e){}
           try{ tf.setFontSize(sz); }catch(e){}
           try{ helv ? tf.updateAppearances(helv) : tf.updateAppearances(); }catch(e){}
           return; }catch(e){}
      try{ if(cerfaSelectOption(form, fid, val, PDFName, cerfaLastPick.has(fid))) return; }catch(e){}
      try{ const rg=form.getRadioGroup(fid); const opts=rg.getOptions();
           const want=cerfaNorm(val);
           const m=opts.find(o=>cerfaNorm(o)===want)||opts.find(o=>cerfaNorm(o).indexOf(want)>=0);
           if(m){ rg.select(m); return; } }catch(e){}
    });
    cerfaApplySharedWidgets(form, PDFName);
    cerfaDrawSSDigits(doc, form, helv);
    /* IMPORTANT : ne PAS appeler form.updateFieldAppearances() globalement —
       cela régénère aussi l'apparence des radios/cases et réaffiche par erreur
       la 1re option (bug « tout coche Permanent / A »). Les boutons gardent
       leur apparence d'origine ; select()/check() positionnent l'état coché. */
    const out=await doc.save();
    downloadBlob(out, cerfaPdfName(), 'application/pdf');
    toast('PDF généré.');
  }catch(err){
    toast('Échec : '+((err&&err.message)||err));
  }finally{ if(btn){ btn.disabled=false; btn.innerHTML=prev; } }
}

function compEff(st){

function compPdfName(){
  const st=STATE['complement-mdph']||{}; const eff=compEff(st);
  let nm=((eff.nom||'')+'_'+(eff.prenom||'')).normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^A-Za-z0-9_\-]/g,'').replace(/_+/g,'_').replace(/^_|_$/g,'');
  if(!nm) nm='patient';
  return 'Compl_Certif_MDPH_'+nm+'_'+todayISO()+'.pdf';
}
function compCheckOnKey(w, PDFName){ return cerfaOnKey(w, PDFName) || PDFName.of('Yes'); }
function compSetCheck(form, fid, checked, PDFName){
  /* Le PDF du complément MDPH contient trois champs dont le nom réel
     exposé à pdf-lib est préfixé par "undefined." (langage écrit,
     calcul/manipulation, fonctions exécutives). On résout donc le champ
     de façon tolérante : nom exact, variantes historiques, puis recherche
     par suffixe. */
  const allFields = (()=>{ try{ return form.getFields(); }catch(e){ return []; } })();
  const candidates=[fid, '.'+fid, 'undefined.'+fid];
  let field=null, foundId='';
  for(const id of candidates){ try{ field=form.getField(id); foundId=id; break; }catch(e){} }
  if(!field){
    const suffix='.'+fid;
    const f=allFields.find(x=>{
      try{ const n=x.getName(); return n===fid || n.endsWith(suffix); }catch(e){ return false; }
    });
    if(f){ field=f; try{ foundId=f.getName(); }catch(e){ foundId=fid; } }
  }
  if(!field) return false;
  /* En première intention, utiliser l'API pdf-lib officielle : elle met à jour
     /V et /AS avec l'état d'apparence correct du widget. */
  try{
    const cb=form.getCheckBox(foundId||fid);
    checked ? cb.check() : cb.uncheck();
  }catch(e){
    try{ if(field.check && field.uncheck){ checked ? field.check() : field.uncheck(); } }catch(e2){}
  }
  /* Sécurisation bas niveau, utile selon les lecteurs PDF et les champs mal nommés. */
  if(!field.acroField) return true;
  let widgets=[]; try{ widgets=field.acroField.getWidgets(); }catch(e){ widgets=[]; }
  widgets.forEach(w=>{
    const onKey=compCheckOnKey(w,PDFName);
    const state=checked ? onKey : PDFName.of('Off');
    try{ w.dict.set(PDFName.of('AS'), state); }catch(e){}
  });
  try{
    if(checked && widgets[0]) field.acroField.dict.set(PDFName.of('V'), compCheckOnKey(widgets[0],PDFName));
    else field.acroField.dict.set(PDFName.of('V'), PDFName.of('Off'));
  }catch(e){}
  return true;
}

function compSelectConsultation(form, val, PDFName){
  if(!val) return;
  let field; try{ field=form.getField('Group3'); }catch(e){ return; }
  if(!field||!field.acroField) return;
  const idx=val==='suivi'?1:0;
  let widgets=[]; try{ widgets=field.acroField.getWidgets(); }catch(e){ widgets=[]; }
  let selected=null;
  widgets.forEach((w,i)=>{ const k=cerfaOnKey(w,PDFName) || PDFName.of(String(i)); const state=(i===idx)?k:PDFName.of('Off'); w.dict.set(PDFName.of('AS'),state); w.dict.set(PDFName.of('V'),state); if(i===idx) selected=k; });
  if(selected) field.acroField.dict.set(PDFName.of('V'), selected);
}

function compDrawSSDigits(doc, form, font){
  const st=STATE['complement-mdph']||{}; const ss=(st.ss||'').replace(/\D/g,'').slice(0,15);
  if(!ss || !font) return;
  const page=doc.getPages()[0]; const size=11;
  for(let i=0;i<15;i++){

      const tf=form.getTextField(fid); try{ tf.setText(''); }catch(e){}

      page.drawText(d,{x:r.x+(r.width-tw)/2,y:r.y+(r.height-size)/2+1.2,size,font});
    }catch(e){}
  }
}

async function genCompPDF(){
  const btn=document.getElementById('compGen'); const prev=btn?btn.innerHTML:'';
  if(btn){ btn.disabled=true; btn.textContent='Génération…'; }
  try{
    const PDFLib=await ensurePDFLib();
    const resp=await fetch(COMPLEMENT_PDF_URL);
    if(!resp.ok) throw new Error('volet complémentaire introuvable (HTTP '+resp.status+')');
    const bytes=await resp.arrayBuffer();
    const { PDFDocument, StandardFonts, PDFName, rgb }=PDFLib;
    const doc=await PDFDocument.load(bytes);
    const form=doc.getForm();
    let font=null; try{ font=await doc.embedFont(StandardFonts.TimesRoman); }catch(e){}
    const V=compValues();
    Object.keys(V).forEach(fid=>{
      const val=V[fid];
      try{
        const tf=form.getTextField(fid); tf.setText(val);
        const ml=COMP_MULTILINE.has(fid); if(ml){ try{ tf.enableMultiline(); }catch(e){} }
        let sz=9;
        try{ const ws=tf.acroField.getWidgets(); const rc=(ws&&ws[0])?ws[0].getRectangle():null; if(rc&&font) sz=cerfaFitSize(font,val,rc.width,rc.height,ml,9); }catch(e){}
        try{ tf.setFontSize(sz); }catch(e){}
        try{ font ? tf.updateAppearances(font) : tf.updateAppearances(); }catch(e){}
      }catch(e){}
    });
    const st=STATE['complement-mdph']||{};
    compSelectConsultation(form, st.consultation, PDFName);
    Object.keys(COMP_CHECK_MAP).forEach(k=>compSetCheck(form, COMP_CHECK_MAP[k], !!st[k], PDFName));
    compDrawManualMarks(doc, st, rgb);
    compDrawSSDigits(doc, form, font);
    const out=await doc.save();
    downloadBlob(out, compPdfName(), 'application/pdf');
    toast('PDF généré.');
  }catch(err){ toast('Échec : '+((err&&err.message)||err)); }
  finally{ if(btn){ btn.disabled=false; btn.innerHTML=prev; } }
}

function openComplementPatientVolet(){
  const openUrl=(url)=>{
    const w=window.open(url,'_blank','noopener');
    if(!w) toast('Ouverture bloquée : autorisez les pop-ups puis réessayez.');
    else toast('Volet patient ouvert dans un nouvel onglet. Utilisez Imprimer / Ctrl+P.');
  };
  const candidates=[COMPLEMENT_PATIENT_PDF_URL, COMPLEMENT_PATIENT_PDF_URL_ALT];
  /* Sur GitHub Pages, fetch permet de tester quel nom exact existe ; en local file://,
     fetch peut être bloqué, donc on ouvre le nom principal en repli. */
  (async()=>{
    for(const url of candidates){
      try{
        const r=await fetch(url,{method:'HEAD',cache:'no-store'});
        if(r.ok){ openUrl(url); return; }
      }catch(e){}
    }
    openUrl(COMPLEMENT_PATIENT_PDF_URL);
  })();
}
